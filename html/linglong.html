// 计算大气散射强度（模型1）
function scatter_model_1(ray_vec, sun_vec) {

    // 返回值
    let red = 0;
    let green = 0;
    let blue = 0;

    // 视线向量归一化
    const ray_length = Math.sqrt(ray_vec[0] * ray_vec[0] + ray_vec[1] * ray_vec[1] + ray_vec[2] * ray_vec[2]);
    if (ray_length === 0) {
        red = 0;
        green = 0;
        blue = 0;
        return [red, green, blue];
    }
    const ray_norm = [];
    ray_norm[0] = ray_vec[0] / ray_length;
    ray_norm[1] = ray_vec[1] / ray_length;
    ray_norm[2] = ray_vec[2] / ray_length;


    // 太阳方向归一化
    const sun_vec_radius = Math.sqrt(sun_vec[0] * sun_vec[0] + sun_vec[1] * sun_vec[1] + sun_vec[2] * sun_vec[2]);
    if (sun_vec_radius === 0) {
        red = 0;
        green = 0;
        blue = 0;
        return [red, green, blue];
    }
    const sun_norm = [];
    sun_norm[0] = sun_vec[0] / sun_vec_radius;
    sun_norm[1] = sun_vec[1] / sun_vec_radius;
    sun_norm[2] = sun_vec[2] / sun_vec_radius;


    // 太阳光入射路径：计算仰角、天顶角、大气光学质量
    const sunElevation = Math.asin(Math.max(-1, Math.min(1, sun_norm[2]))); // [-π/2, π/2]
    const sunElevationDeg = sunElevation * 180 / Math.PI;
    const sunZenith = Math.PI / 2 - sunElevation; // [0, π]
    const sunZenithDeg = sunZenith * 180 / Math.PI;
    let sunAirMass;
    // Kasten-Young, Ref. https://kexue.fm/archives/396
    if (sunElevationDeg >= 0) {
        sunAirMass = 1.0 / (Math.cos(sunZenith) + 0.50572 * Math.pow(96.07995 - sunZenithDeg, -1.6364));
    }
    else {
        sunAirMass = 40;
    }


    // 观察者视线的仰角、天顶角、大气光学质量
    const viewZenith = Math.acos(Math.max(0, Math.min(1, ray_norm[2])));
    const viewZenithDeg = viewZenith * 180 / Math.PI;
    const viewElevationDeg = 90 - viewZenithDeg;
    let viewAirMass;
    // Kasten-Young, Ref. https://kexue.fm/archives/396
    if (viewElevationDeg >= 0) {
        viewAirMass = 1.0 / (Math.cos(viewZenith) + 0.50572 * Math.pow(96.07995 - viewZenithDeg, -1.6364));
    }
    else {
        viewAirMass = 40;
    }


    // 观察方向与太阳方向夹角余弦
    const cosTheta = ray_norm[0] * sun_norm[0] + ray_norm[1] * sun_norm[1] + ray_norm[2] * sun_norm[2];


    // 米氏散射相函数
    const mie_g = 0.9; // 米氏散射不对称因子
    const miePhase = Math.pow(1 + mie_g * mie_g - 2 * mie_g * cosTheta, -1.5);


    // 瑞利散射相函数
    const rayleighPhase = (1 + cosTheta * cosTheta) / 4 * 3;


    // 计算视线方向的大气密度系数：直觉上来看，密度越大，对散射的贡献越大
    const H = 8.5; // 虚拟大气层厚度 (km)
    const mu = Math.max(0.01, ray_norm[2]); // 避免除零，mu = cos(天顶角)
    const densityFactor = Math.exp(-mu / H);


    // 分波长计算瑞利散射系数
    const wavelengths = [680, 550, 450]; // 波长相关的瑞利散射系数 (近似)
    const rayleighBetaBase = 0.3; // 参考波长下的瑞利散射系数，感觉是海拔越高越小
    const referenceWavelength = wavelengths[1]; // G分量作为参考（550nm）
    const betaRayleigh = [];
    for (let i = 0; i < wavelengths.length; i++) {
        // betaRayleigh[i] = rayleighBetaBase * Math.pow(referenceWavelength / wavelengths[i], 4);
        const wl = referenceWavelength / wavelengths[i];
        const wlwl = wl * wl;
        betaRayleigh[i] = rayleighBetaBase * wlwl * wlwl;
    }


    // 米氏散射系数：地平线附近，气溶胶浓度剧增（用viewAirMass模拟），米氏散射贡献显著上升
    const mie_beta_base = 0.001; // 米氏散射系数 越大光斑越大
    const mie_beta_max = 0.1; // 米氏散射系数最大值
    const effectiveMieBeta = Math.min(mie_beta_max, mie_beta_base * viewAirMass);


    // 计算每个通道的散射强度（考虑光程衰减）
    const intensities = [];
    for (let i = 0; i < wavelengths.length; i++) {
        // 散射光强度 ∝ 相函数 × exp(-totalBeta * sunAirMass) × density
        // 注意：实际是体散射积分，此处简化为比例模型
        const rayleighContrib = betaRayleigh[i] * rayleighPhase;
        const mieContrib = effectiveMieBeta * miePhase;

        const totalBeta = betaRayleigh[i] + effectiveMieBeta; // 总消光系数（简化）

        // 衰减：散射光在传播到观察者途中也会被吸收
        // 关键修正：衰减中加入时间调节因子，控制一天中不同时间的衰减强度，防止白天出现过于明显的维纳斯带
        // let attn_scale = 0.5 * Math.cos(2 * sunElevation) + 0.501;
        let attn_scale = (sunElevationDeg >= 0) ? Math.exp(- Math.pow((sunElevationDeg / 20), 4)) + 0.01 : 1;
        let attenuation = Math.exp(-totalBeta * viewAirMass * attn_scale);

        const totalScattering = (rayleighContrib + mieContrib) * attenuation * densityFactor;

        // 臭氧吸收
        const ozone_absorption = [
            0.005,  // Red   (650nm) — 弱吸收
            0.040,  // Green (550nm) — 中等吸收
            0.025   // Blue  (450nm) — 比绿光略弱（实际臭氧在~600nm最强，但简化模型）
        ];
        const ozoneTransmittance = Math.exp(-ozone_absorption[i] * sunAirMass * 0.8); // 调节因子

        intensities[i] = totalScattering * ozoneTransmittance;
    }

    // 归一化或缩放到 [0,1]
    red   = intensities[0];
    green = intensities[1];
    blue  = intensities[2];

    // 太阳落到地平线以下时，进一步衰减散射光
    const night_attn = (sunElevationDeg >= 0) ? 1.0 : Math.max(0, Math.exp(0.016 * sunElevationDeg));
    red   *= night_attn;
    green *= night_attn;
    blue  *= night_attn;

    // 全局增益
    const global_gain = 2.0;

    return [
        Math.min(1, red   * global_gain), // R
        Math.min(1, green * global_gain), // G
        Math.min(1, blue  * global_gain)  // B
    ];
}




// 计算大气散射强度（模型2：Nishita模型）
// Ref. https://www.scratchapixel.com/lessons/procedural-generation-virtual-worlds/simulating-sky/simulating-colors-of-the-sky.html
function scatter_model_2(ray_vec, sun_vec) {

    // 返回值
    let red = 0;
    let green = 0;
    let blue = 0;

    // 视线向量归一化
    const ray_length = Math.sqrt(ray_vec[0] * ray_vec[0] + ray_vec[1] * ray_vec[1] + ray_vec[2] * ray_vec[2]);
    if (ray_length === 0) {
        red = 0;
        green = 0;
        blue = 0;
        return [red, green, blue];
    }
    const ray_norm = [];
    ray_norm[0] = ray_vec[0] / ray_length;
    ray_norm[1] = ray_vec[1] / ray_length;
    ray_norm[2] = ray_vec[2] / ray_length;


    // 太阳方向归一化
    const sun_vec_radius = Math.sqrt(sun_vec[0] * sun_vec[0] + sun_vec[1] * sun_vec[1] + sun_vec[2] * sun_vec[2]);
    if (sun_vec_radius === 0) {
        red = 0;
        green = 0;
        blue = 0;
        return [red, green, blue];
    }
    const sun_norm = [];
    sun_norm[0] = sun_vec[0] / sun_vec_radius;
    sun_norm[1] = sun_vec[1] / sun_vec_radius;
    sun_norm[2] = sun_vec[2] / sun_vec_radius;


    // 太阳光入射路径：计算仰角、天顶角、大气光学质量
    const sunElevation = Math.asin(Math.max(-1, Math.min(1, sun_norm[2]))); // [-π/2, π/2]
    const sunElevationDeg = sunElevation * 180 / Math.PI;

    // 观察者视线的仰角、天顶角、大气光学质量
    const viewZenith = Math.acos(Math.max(0, Math.min(1, ray_norm[2])));
    const viewZenithDeg = viewZenith * 180 / Math.PI;
    const viewElevationDeg = 90 - viewZenithDeg;

    // 观察方向与太阳方向夹角余弦
    const cosTheta = ray_norm[0] * sun_norm[0] + ray_norm[1] * sun_norm[1] + ray_norm[2] * sun_norm[2];

    // 米氏散射相函数
    const g = 0.7;
    const miePhase = 3.0 / (8.0 * Math.PI) * ((1.0 - g*g) * (1 + cosTheta * cosTheta)) / ((2.0 + g*g) * Math.pow(1.0 + g*g - 2.0 * g * cosTheta, 1.5));

    // 瑞利散射相函数
    const rayleighPhase = (1 + cosTheta * cosTheta) / 4 * 3;

    // 分波长计算瑞利散射系数
    const wavelengths = [680, 550, 450]; // 波长相关的瑞利散射系数 (近似)
    const rayleighBetaBase = 0.04; // 参考波长下的 β
    const referenceWavelength = wavelengths[1]; // G分量作为参考（550nm）
    const betaRayleigh = [];
    for (let i = 0; i < wavelengths.length; i++) {
        // betaRayleigh[i] = rayleighBetaBase * Math.pow(referenceWavelength / wavelengths[i], 4);
        const wl = referenceWavelength / wavelengths[i];
        const wlwl = wl * wl;
        betaRayleigh[i] = rayleighBetaBase * wlwl * wlwl;
    }

    // 米氏散射beta
    const beta_Mie = 0.05;

    const H = 8.0; // 大气层厚度
    const H_R = 8.0;
    const H_M = 1.2;
    const R = (sunElevationDeg >= 0) ? ((3000-300) * Math.exp(-sunElevationDeg * 0.1) + 300) : ((3000-60) * Math.exp(sunElevationDeg * 0.2) + 60);

    const S = 6;

    // 已知三角形ABC，AB固定为(R-H)，AC固定为R，角B=α+90°，求BC关于α的表达式。

    const view_alt = (viewElevationDeg >= 90) ? (180 - viewElevationDeg) : viewElevationDeg;
    const cos_view_alt = Math.cos(to_rad(view_alt));
    const sin_view_alt = Math.sin(to_rad(view_alt));
    const Lray = Math.sqrt(R*R - (R-H)*(R-H) * cos_view_alt * cos_view_alt) - (R-H) * sin_view_alt;

    const sun_alt = (sunElevationDeg >= 90) ? (180 - sunElevationDeg) : sunElevationDeg;
    const cos_sun_alt = Math.cos(to_rad(sun_alt));
    const sin_sun_alt = Math.sin(to_rad(sun_alt));
    const Lsun = Math.sqrt(R*R - (R-H)*(R-H) * cos_sun_alt * cos_sun_alt) - (R-H) * sin_sun_alt;

    let sum_R_r = 0; let sum_R_g = 0; let sum_R_b = 0;
    let sum_M_r = 0; let sum_M_g = 0; let sum_M_b = 0;
    let depth_R = 0;
    let depth_M = 0;

    for (let i = 0; i < S; i++) {
        let t = i / S;

        let L_t = t * Lray;
        let dl = L_t / S;
        let h_R_t = t * H_R;
        let h_M_t = t * H_M;
        let density_R_t = Math.exp(-h_R_t / H_R);
        let density_M_t = Math.exp(-h_M_t / H_M);

        depth_R += density_R_t * dl;
        depth_M += density_M_t * dl;

        let depth_sun_R = 0;
        let depth_sun_M = 0;

        let Lsun_t = (1-t) * Lsun;
        let dlsun = Lsun_t / S;

        for (let j = 0; j < S; j++) {
            let n = j / S;
            let hsun_R = h_R_t + n * (1-t) * H_R;
            let hsun_M = h_M_t + n * (1-t) * H_M;
            let density_sun_R = Math.exp(-hsun_R / H_R);
            let density_sun_M = Math.exp(-hsun_M / H_M);
            depth_sun_R += density_sun_R * dlsun;
            depth_sun_M += density_sun_M * dlsun;
        }

        let tau_r = betaRayleigh[0] * (depth_sun_R + depth_R) + beta_Mie * (depth_sun_M + depth_M) * 1.1;
        let tau_g = betaRayleigh[1] * (depth_sun_R + depth_R) + beta_Mie * (depth_sun_M + depth_M) * 1.1;
        let tau_b = betaRayleigh[2] * (depth_sun_R + depth_R) + beta_Mie * (depth_sun_M + depth_M) * 1.1;

        let attn_r = Math.exp(-tau_r);
        let attn_g = Math.exp(-tau_g);
        let attn_b = Math.exp(-tau_b);

        sum_R_r += attn_r * depth_R; sum_R_g += attn_g * depth_R; sum_R_b += attn_b * depth_R;
        sum_M_r += attn_r * depth_M; sum_M_g += attn_g * depth_M; sum_M_b += attn_b * depth_M;
    }

    // 臭氧吸收
    const oz_factor = 0.16;
    const ozone_absorption = [
        0.005,  // Red   (650nm) — 弱吸收
        0.030,  // Green (550nm) — 中等吸收
        0.010   // Blue  (450nm) — 比绿光略弱（实际臭氧在~600nm最强，但简化模型）
    ];
    const oz_r = Math.exp(-ozone_absorption[0] * Lsun * oz_factor);
    const oz_g = Math.exp(-ozone_absorption[1] * Lsun * oz_factor);
    const oz_b = Math.exp(-ozone_absorption[2] * Lsun * oz_factor);

    red   = (sum_R_r * betaRayleigh[0] * rayleighPhase + sum_M_r * beta_Mie * miePhase) * oz_r;
    green = (sum_R_g * betaRayleigh[1] * rayleighPhase + sum_M_g * beta_Mie * miePhase) * oz_g;
    blue  = (sum_R_b * betaRayleigh[2] * rayleighPhase + sum_M_b * beta_Mie * miePhase) * oz_b;

    // 全局增益
    const global_gain = (4.0-1.8) * Math.exp(-(sunElevationDeg / 3) * (sunElevationDeg / 3)) + 1.8;

    return [
        Math.min(1, red   * global_gain), // R
        Math.min(1, green * global_gain), // G
        Math.min(1, blue  * global_gain)  // B
    ];
}






function scatter_model_3(ray_vec, sun_vec) {

    // ================================================================
    // 大气物理常数（国际单位制，长度单位：米）
    //
    // 模型基于 Nishita et al. 1993，扩展如下改进：
    //   · 球形几何（精确射线-球面求交）
    //   · 逐采样点地球遮蔽阴影检测
    //   · 二阶多次散射（对天球方向的数值积分）
    // ================================================================
    const Re  = 6360e3;                    // 地球半径 (m)
    const Ra  = 6420e3;                    // 大气层外边界半径 (m)
    const Hr  = 7994;                      // Rayleigh 标高 (m)
    const Hm  = 1200;                      // Mie 标高 (m)

    // Rayleigh 海平面散射系数 (m⁻¹)，对应 R(680nm) / G(550nm) / B(440nm)
    const bR  = [5.8e-6, 13.5e-6, 33.1e-6];
    const bM  = 16e-6;                     // Mie 散射系数 (m⁻¹)
    const bMe = bM * 0.1;                  // Mie 消光系数 ≈ 1.1 × 散射系数 NOTE 防止地平线消光过度，故将其调整到0.1
    const g   = 0.76;                      // Mie 各向异性参数（前向散射优势）
    const SUN = 20.0;                      // 太阳强度归一化系数

    // ================================================================
    // 向量工具函数（内联，不依赖外部实现）
    // ================================================================
    const vLen  = v  => Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]);
    const vNorm = v  => { const l = vLen(v); return l > 1e-12 ? [v[0]/l, v[1]/l, v[2]/l] : [0,0,0]; };
    const vDot  = (a, b) => a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
    const vAdd  = (a, b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]];
    const vMul  = (v, s) => [v[0]*s, v[1]*s, v[2]*s];

    // ================================================================
    // 输入归一化与有效性检验
    // ================================================================
    let ray_vec_processed = ray_vec;
    if (ray_vec[2] < 0) {
        ray_vec_processed = [ray_vec[0], ray_vec[1], -ray_vec[2]];
    }
    const dir    = vNorm(ray_vec_processed);
    const sunDir = vNorm(sun_vec);
    if (vLen(dir) < 0.5 || vLen(sunDir) < 0.5) return [0, 0, 0];

    // 观测者位于海平面（坐标系：Z 轴朝上，与原代码一致）
    const orig = [0.0, 0.0, Re + 1.0];

    // 太阳仰角
    const sunElevation = Math.asin(Math.max(-1, Math.min(1, sunDir[2]))); // [-π/2, π/2]
    const sunElevationDeg = sunElevation * 180 / Math.PI;

    // 观察者视线的仰角、天顶角
    const viewZenith = Math.acos(Math.max(0, Math.min(1, dir[2])));
    const viewZenithDeg = viewZenith * 180 / Math.PI;
    const viewElevationDeg = 90 - viewZenithDeg;

    // ================================================================
    // 射线–球面求交（球心在坐标原点，半径 r）
    //
    // |o + t·d|² = r²  ⟹  t² + 2(o·d)t + (|o|²−r²) = 0
    //
    // 注意：若射线起点在球内（如大气内），则 t₀ < 0 < t₁，
    // 调用处应取 t = max(0, t₀) 作为积分起点。
    // ================================================================
    const rsi = (o, d, r) => {
        const b    = 2.0 * vDot(o, d);
        const c    = vDot(o, o) - r * r;
        const disc = b * b - 4.0 * c;       // a = 1（d 已归一化）
        if (disc < 0.0) return null;
        const sq = Math.sqrt(disc);
        return [(-b - sq) * 0.5, (-b + sq) * 0.5];
    };

    // ================================================================
    // 散射相位函数
    //
    // 参数约定与 Nishita 参考代码一致：
    //   μ = dot(视线方向 d, 太阳方向 sunDir)
    //
    // 物理意义：μ 是视线方向与太阳方向的夹角余弦。
    // 对于 Rayleigh（μ² 对称），取值方向不影响结果；
    // 对于 Mie（g=0.76 前向散射），μ=1 时达到峰值，
    // 即观测者朝向太阳时散射最强——物理上正确。
    // ================================================================
    const phaseR = mu => 3.0 / (16.0 * Math.PI) * (1.0 + mu * mu);
    const phaseM = mu => {
        const base = Math.max(1e-10, 1.0 + g*g - 2.0*g*mu);
        return 3.0 / (8.0 * Math.PI)
               * ((1.0 - g*g) * (1.0 + mu*mu))
               / ((2.0 + g*g) * Math.pow(base, 1.5));
    };

    // ================================================================
    // 核心单次散射步进（Nishita 1993，公式 4 / 5）
    //
    // 沿射线 o + t·d（t ∈ [t0, t1]）数值积分。
    // 主射线取 nV 个采样点，每点向太阳方向追踪 nL 个次级采样，
    // 判断是否被地球遮挡，并计算两段路径的合并透射率。
    //
    // 返回：{ sumR[3], sumM[3] }，其中
    //   sumR[c] = Σᵢ exp(−τᶜᵢ) · ρR(hᵢ) · Δs     （Rayleigh 加权积分）
    //   sumM[c] = Σᵢ exp(−τᶜᵢ) · ρM(hᵢ) · Δs     （Mie 加权积分）
    //
    // 最终颜色 = (sumR[c]·βR[c]·PR + sumM[c]·βM·PM) · SUN
    // ================================================================
    const marchRay = (o, d, t0, t1, nV, nL) => {
        const segLen = (t1 - t0) / nV;
        const sumR   = [0.0, 0.0, 0.0];
        const sumM   = [0.0, 0.0, 0.0];
        let odR = 0.0, odM = 0.0;    // 沿主射线从起点累积的光学深度

        for (let i = 0; i < nV; i++) {
            const t   = t0 + (i + 0.5) * segLen;
            const pos = vAdd(o, vMul(d, t));
            const h   = vLen(pos) - Re;
            // if (h < 0.0) continue;   // 采样点位于地表以下，跳过

            // 当前采样点的大气密度（指数衰减）× 路径增量
            const dR = Math.exp(-h / Hr) * segLen;
            const dM = Math.exp(-h / Hm) * segLen;
            odR += dR;
            odM += dM;

            // ── 向太阳方向追踪次级射线 ──
            const sh = rsi(pos, sunDir, Ra);
            if (!sh || sh[1] <= 0.0) continue;

            const lSeg = sh[1] / nL;
            let lR = 0.0, lM = 0.0, blocked = false;

            for (let j = 0; j < nL; j++) {
                const lp = vAdd(pos, vMul(sunDir, (j + 0.5) * lSeg));
                const lh = vLen(lp) - Re;
                if (lh < 0.0) { blocked = true; break; }   // ← 地球遮蔽：此采样点无直射阳光
                lR += Math.exp(-lh / Hr) * lSeg;
                lM += Math.exp(-lh / Hm) * lSeg;
            }
            if (blocked) continue;   // 整段太阳射线被遮，跳过此视线采样点

            // NOTE 又是一个拍脑袋补丁：避免地平线处消光过度、变黑
            //      受限于性能，迭代次数不能太多，这就导致积分步长过长，在地平线附近进行视线积分时，过长的步长使得光程偏长，导致消光过度
            //      因此，一方面，限制光程，另一方面，调整bMe
            // const max_len = (100000-50000) * Math.exp(- (sunElevationDeg / 10) * (sunElevationDeg / 10)) + 50000;
            // odR = Math.min(odR, max_len);
            // odM = Math.min(odM, max_len);

            // 合并透射率（公式5：e^a · e^b = e^(a+b)，避免两次指数调用）
            for (let c = 0; c < 3; c++) {
                let tau   = bR[c] * (odR + lR) + bMe * (odM + lM);
                const atten = Math.exp(-tau);
                sumR[c] += atten * dR;
                sumM[c] += atten * dM;
            }
        }
        return { sumR, sumM };
    };

    // ================================================================
    // 确定主视线与大气球的有效积分范围
    // ================================================================
    const atmHit = rsi(orig, dir, Ra);
    if (!atmHit || atmHit[1] < 0.0) return [0, 0, 0];
    let tMin = Math.max(0.0, atmHit[0]);
    let tMax = atmHit[1];

    const earthHit = rsi(orig, dir, Re);
    if (earthHit && earthHit[0] > 1.0) {
        // 视线从外部射入地球（观测者在地面以上，ray 指向地面方向）
        tMax = Math.min(tMax, earthHit[0]);
    }

    if (tMax <= tMin) return [0, 0, 0];

    // ================================================================
    // 一阶单次散射（Nishita 核心路径积分）
    // ================================================================
    const mu1 = vDot(dir, sunDir);
    const pR1 = phaseR(mu1);
    const pM1 = phaseM(mu1);
    const sc1 = marchRay(orig, dir, tMin, tMax, 64, 2);

    // color 数组直接累加后续贡献，此处先写入一阶结果
    const color = [
        (sc1.sumR[0] * bR[0] * pR1 + sc1.sumM[0] * bM * pM1) * SUN,
        (sc1.sumR[1] * bR[1] * pR1 + sc1.sumM[1] * bM * pM1) * SUN,
        (sc1.sumR[2] * bR[2] * pR1 + sc1.sumM[2] * bM * pM1) * SUN
    ];

    // ================================================================
    // 二阶多次散射（第一性原理数值积分）
    //
    // 物理机制：视线上每个采样点 X 除接受直射阳光（一阶散射）外，
    // 还受到来自其他方向的已散射天光照射。
    //
    // 晨昏时段：下层大气处于地球阴影中，一阶散射贡献极少；
    // 但高层大气仍在阳光照射下，并向各方向发出一次散射天光，
    // 这些光子到达 X 后再次散射至观测者——这是真实黄昏/晨曦
    // 天空亮度的主要物理来源，无需任何阈值判断，完全由几何决定。
    //
    // 积分公式（对视线路径和天球方向各取一次数值积分）：
    //
    //   L₂(eye) = ∫_view T(eye→X) ·
    //       ∫_{4π} L₁(X,ω) · [βR·PR(ω,d) + βM·PM(ω,d)] · dω · dt
    //
    //   其中：
    //     · T(eye→X)  : 视线方向的透射率（已在主射线中累积）
    //     · L₁(X,ω)   : 从 X 沿方向 ω 的一次散射天光辐亮度
    //                    由轻量 marchRay 调用计算（4+4 采样）
    //     · βR·PR + βM·PM : X 处将入射天光向观测者方向散射的强度
    //     · 球面积分用 N_AMB 个均匀方向蒙特卡洛离散化（dΩ = 2π/N）
    //
    // 相位函数方向约定：
    //     入射光子行进方向 = −ω（天光从方向 ω 射向 X）
    //     出射光子行进方向 = −d（从 X 射向眼睛，d = orig→X 方向）
    //     μ_scatter = cos θ = dot(−ω, −d) = dot(ω, d)
    // ================================================================

    // 上半球离散采样方向（8 方向，准均匀覆盖上半球 2π sr）
    // 重要：这些是固定的物理方向，不含任何太阳角度阈值逻辑
    const ambDirs = [
        [ 0.0,  0.0,  1.0],     // 天顶
        [ 1.0,  0.0,  0.5],     // 偏东上
        [-1.0,  0.0,  0.5],     // 偏西上
        [ 0.0,  1.0,  0.5],     // 偏北上
        [ 0.0, -1.0,  0.5],     // 偏南上
        [ 1.0,  1.0,  0.5],     // 东北
        [-1.0,  1.0,  0.5],     // 西北
        [ 1.0, -1.0,  0.5],     // 东南
        [-1.0, -1.0,  0.5],     // 西南
    ].map(vNorm);

    const N_AMB  = ambDirs.length;
    const dOmega = 2.0 * Math.PI / N_AMB;   // 每方向代表的立体角（上半球 2π / N_AMB）

    const N_V2  = 6;                         // 二阶路径采样数（粗于一阶，节省算力）
    const segV2 = (tMax - tMin) / N_V2;
    let odR2 = 0.0, odM2 = 0.0;             // 累积视线光学深度（eye → 当前采样点）

    const global_gain = (16-2) * Math.exp(- (sunElevationDeg / 10) * (sunElevationDeg / 10)) + 2;

    for (let i = 0; i < N_V2; i++) {
        const t   = tMin + (i + 0.5) * segV2;
        const pos = vAdd(orig, vMul(dir, t));
        const h   = vLen(pos) - Re;
        if (h < 0.0) continue;

        const dR = Math.exp(-h / Hr) * segV2;
        const dM = Math.exp(-h / Hm) * segV2;
        odR2 += dR;
        odM2 += dM;

        // T(eye → X)：视线方向累积透射率
        const Tv = [0, 1, 2].map(c =>
            Math.exp(-(bR[c] * odR2 + bMe * odM2))
        );

        for (let k = 0; k < N_AMB; k++) {
            const ad = ambDirs[k];

            // 从 X 出发沿方向 ad 找到大气出口（X 在大气内，t₀ < 0 < t₁）
            const aHit = rsi(pos, ad, Ra);
            if (!aHit || aHit[1] <= 0.0) continue;

            // 计算从 X 出发沿方向 ad 的一次散射天光 L₁(X, ad)
            // 使用轻量级步进（4 主采样 + 4 太阳采样），性能友好
            const muA = vDot(ad, sunDir);
            const sc  = marchRay(pos, ad, 0.0, aHit[1], 3, 3);

            const L1 = [
                (sc.sumR[0]*bR[0]*phaseR(muA) + sc.sumM[0]*bM*phaseM(muA)) * SUN,
                (sc.sumR[1]*bR[1]*phaseR(muA) + sc.sumM[1]*bM*phaseM(muA)) * SUN,
                (sc.sumR[2]*bR[2]*phaseR(muA) + sc.sumM[2]*bM*phaseM(muA)) * SUN
            ];

            // X 处将天光 L₁ 散射向观测者方向
            // 相位函数参数：μ = dot(ad, dir)（见上方推导）
            const muS = vDot(ad, dir);
            const pRS = phaseR(muS);
            const pMS = phaseM(muS);

            for (let c = 0; c < 3; c++) {
                // 二阶贡献 = L₁ · (βR·PR·ρR·Δs + βM·PM·ρM·Δs) · T(eye→X) · dΩ
                const sigma = bR[c] * pRS * dR + bM * pMS * dM;
                color[c]   += L1[c] * sigma * Tv[c] * dOmega * global_gain;
            }
        }
    }



    // ================================================================
    // 夜天光（Airglow / Nightglow）
    //
    // 物理机制：
    //   中间层顶（mesopause）附近 85–105 km 的光化学发光，
    //   主要辐射组分：
    //     · O(¹S) 绿线 557.7 nm  ── 原子氧三体复合，峰值 ~90–100 km
    //     · OH Meinel 振动带      ── 羟基弛豫，~87 km（贡献红通道）
    //     · O₂ Herzberg / 大气带 ── 分子氧发光，~85–100 km（红通道）
    //     · Na D 线 589 nm       ── 钠原子共振辐射（绿/红通道）
    //
    //   发光层密度剖面建模为高斯函数，中心 h_ag = 90 km，
    //   标准差 sig_ag = 12 km（半峰全宽约 28 km）。
    //
    // van Rhijn 效应（自动体现）：
    //   斜视线穿越球壳路径长度约为天顶的 1/sin(仰角) 倍，
    //   地平线方向亮度约为天顶的 4–5×（van Rhijn 增亮部分被
    //   大气消光抵消后的净效果）。
    //   本实现通过高斯剖面的路径积分自然体现，无需显式修正系数。
    //
    //   采样密度设计：积分范围始终覆盖 ±3.5σ 的高度跨度，
    //   路径步长随仰角等比缩放，换算为高度步长 = 7σ/N_AG ≈ 3.5 km
    //   ≈ σ/3.4，与仰角无关，保证各角度精度一致。
    //
    // 大气消光（Rozenberg 球形 Chapman 函数近似）：
    //
    //   τ(θ₀) ≈ β · H / √(sin²θ₀ + 2H/Rₑ)
    //
    //   · θ₀ 为仰角，sin θ₀ = dir[2]（z 轴朝上约定）
    //   · 仰角 90°（天顶）退化为平大气结果 τ₀ = β·H  ✓
    //   · 仰角 0°（地平线）给出有限值 τ = β·√(H·Rₑ/2)，
    //     消除平大气 1/cosθ 奇点  ✓
    //   · 相对严格 Chapman 函数误差 < 5%（仰角 > 1°）
    //
    // 白天压制：
    //   日散射天空约 10⁹–10¹⁰ Rayleigh；夜天光合计约 500–1000 R。
    //   前者约强 10⁷ 倍，自然压制，无需任何人工阈值。
    //
    // 强度定标说明：
    //   物理量级为 AIRGLOW_SCALE ≈ 2e-12（相对本模型 SUN=20 定标）。
    //   此处上调至 1.8e-7（约 10⁵× 物理值）以在常规色调映射下可见。
    //   如使用 HDR 渲染并手动控制夜景曝光，建议降低至 1e-9 ~ 1e-10。
    // ================================================================
/*
    // --- 发光层参数 ---
    const h_ag    = 90e3;                          // 发光中心高度 (m)
    const sig_ag  = 12e3;                          // 发光层厚度标准差 (m)
    const agInnerR = Re + h_ag - 3.5 * sig_ag;    // 积分内边界球半径（h ≈ 48 km）
    const agOuterR = Re + h_ag + 3.5 * sig_ag;    // 积分外边界球半径（h ≈ 132 km）

    // --- 光谱权重（对应 R=680nm / G=550nm / B=440nm 通道） ---
    //   G（550nm）：O(¹S) 557.7nm 主导（最亮单一组分）
    //   R（680nm）：OH Meinel 带 + O₂ 带（宽带，贡献显著）
    //   B（440nm）：极弱（Ca⁺ 等离子线为主）
    const ag_spec = [0.30, 1.00, 0.10];

    // --- 强度标度 ---
    // 调整此值可控制夜天光可见度：
    //   · 物理精确（HDR + 夜景曝光）: ~2e-12
    //   · 渲染演示（常规 tonemapping）: ~1.8e-7（当前值）
    const AIRGLOW_SCALE = 1.8e-7;

    // --- Rozenberg 球形 Chapman 函数 ---
    // 夜天光光子从 ~90 km 穿越整层大气到达观测者，主要消光在低层大气
    const sinElev_ag  = Math.max(dir[2], 1e-4);   // 仰角正弦（dir[2] = sin(仰角)）
    const chapR_denom = Math.sqrt(sinElev_ag * sinElev_ag + 2.0 * Hr / Re);
    const chapM_denom = Math.sqrt(sinElev_ag * sinElev_ag + 2.0 * Hm / Re);

    // 各通道大气透射率（观测者 ↔ 夜天光层，Rayleigh + Mie 消光）
    const agTrans = [0, 1, 2].map(c => {
        const tau = bR[c] * Hr / chapR_denom + bMe * Hm / chapM_denom;
        return Math.exp(-tau);
    });

    // --- 沿视线数值积分夜天光发光层 ---
    // 观测者在 agInnerR（h ≈ 48 km）球内，
    // agHitInner[1] 为视线穿出 48 km 球壳的时刻（发光层入口）
    const agHitInner = rsi(orig, dir, agInnerR);
    const agHitOuter = rsi(orig, dir, agOuterR);

    if (agHitOuter && agHitOuter[1] > 0) {
        const ag_t0 = (agHitInner && agHitInner[1] > 0) ? agHitInner[1] : 0.0;
        const ag_t1 = agHitOuter[1];

        const N_AG  = 24;
        const agSeg = (ag_t1 - ag_t0) / N_AG;

        for (let i = 0; i < N_AG; i++) {
            const t   = ag_t0 + (i + 0.5) * agSeg;
            const pos = vAdd(orig, vMul(dir, t));
            const h   = vLen(pos) - Re;
            if (h < 0) continue;

            // 高斯发光密度 × 路径增量
            // van Rhijn 效应体现于此：低仰角 agSeg 更大，积分自然增大
            const dh     = h - h_ag;
            const emitDt = Math.exp(-0.5 * (dh / sig_ag) * (dh / sig_ag)) * agSeg;

            // 累加各通道：发光量 × 大气透射率 × 光谱权重 × 强度
            for (let c = 0; c < 3; c++) {
                color[c] += ag_spec[c] * emitDt * agTrans[c] * AIRGLOW_SCALE;
            }
        }
    }
*/

    // 臭氧吸收
    const ozone_absorption = [0.005, 0.030, 0.010];
    const oz_scale = 80;
    color[0] *= Math.exp(-ozone_absorption[0] * ((tMax - tMin) / Ra) * oz_scale);
    color[1] *= Math.exp(-ozone_absorption[1] * ((tMax - tMin) / Ra) * oz_scale);
    color[2] *= Math.exp(-ozone_absorption[2] * ((tMax - tMin) / Ra) * oz_scale);

    // const cosZ    = Math.max(dir[2], 0.05);       // sin(仰角)，限制最小值
    // const airmass = 1.0 / cosZ;                   // 大气质量因子（简化 Chapman 函数）
    // const ozTau   = [0.002, 0.012, 0.007];        // 每单位 AM 的臭氧光学厚度（R/G/B）
    // color[0] *= Math.exp(-ozTau[0] * airmass);
    // color[1] *= Math.exp(-ozTau[1] * airmass);
    // color[2] *= Math.exp(-ozTau[2] * airmass);

    // HDR
    const hdr_mapping = (x)=> {
        const e = 0.2;
        return (Math.sqrt(1+e)/2) * (Math.sqrt((1+x)*(1+x)+e) - Math.sqrt((1-x)*(1-x)+e));
    };

    color[0] = hdr_mapping(color[0]);
    color[1] = hdr_mapping(color[1]);
    color[2] = hdr_mapping(color[2]);

    // 拍脑袋：夜天光
    const night_light_scale = 1 - viewElevationDeg / 90;
    color[0] += 0.05 * night_light_scale;
    color[1] += 0.08 * night_light_scale;
    color[2] += 0.10 * night_light_scale;

    // 返回线性 HDR 辐亮度值（未做色调映射，建议调用方自行处理）
    return color;
}








function calculate_scattered_pixel(ray_vec, sun_vec, model_index) {
    if (model_index === 1) {
        return scatter_model_1(ray_vec, sun_vec);
    }
    else if (model_index === 2) {
        return scatter_model_2(ray_vec, sun_vec);
    }
    else if (model_index === 3) {
        return scatter_model_3(ray_vec, sun_vec);
    }
    else {
        return [0,0,0];
    }
}





// 渲染整个天空
function render_all(
    frame_buffer, fb_width, fb_height,
    sky_radius, center_x, center_y,
    view_alt, view_azi, view_roll, f,
    year, month, day, hour, minute, second, timezone, longitude, latitude
) {

    // 计算太阳位置
    const sun_horizontal_coord = where_is_the_sun(year, month, day, hour, minute, second, timezone, longitude, latitude);
    const sun_alt = sun_horizontal_coord[0];
    const sun_azi = sun_horizontal_coord[1];
    const sun_vec = horizontal_to_xyz(sun_azi, sun_alt, RADIUS);
    const sun_proj_xy = fisheye_project(sun_azi, sun_alt, RADIUS, center_x, center_y, view_alt, view_azi, view_roll, f);


    // 计算月球位置、月相、月球方向角

    let jd = julian_day(year, month, day, hour, minute, second, timezone);

    let moon_ec = calculate_lunar_equatorial_coordinates(jd);
    let moon_RA = moon_ec[0];
    let moon_Dec = moon_ec[1];

    let moon_hc = equatorial_to_horizontal(moon_RA, moon_Dec, year, month, day, hour, minute, second, timezone, longitude, latitude);
    let moon_azi = moon_hc[1];
    let moon_alt = moon_hc[0];

    // 计算月球的屏幕投影坐标
    let moon_proj_xy = fisheye_project(moon_azi, moon_alt, RADIUS, center_x, center_y, view_alt, view_azi, view_roll, f);

    const xa = moon_proj_xy[0];
    const ya = moon_proj_xy[1];

    // 以下是计算月面贴图的北极（月球地理北极）相对于屏幕y轴的旋转角
    // 这一步是旋转月球地理北极，使其指向其所在的天球子午圈北向切线方向，为后面计算月球亮区旋转角作准备
    // 天球赤道坐标系经圈（子午圈）上，月亮所在位置往北2度的位置，在屏幕上的投影坐标

    let northdelta_hc = equatorial_to_horizontal(
        moon_RA, moon_Dec + 2, year, month, day, hour, minute, second, timezone,
        longitude, latitude);

    let northdelta_azi = northdelta_hc[1];
    let northdelta_alt = northdelta_hc[0];

    let northdelta_scr_xy = fisheye_project(northdelta_azi, northdelta_alt, RADIUS, center_x, center_y, view_alt, view_azi, view_roll, f);
    let xb = northdelta_scr_xy[0];
    let yb = northdelta_scr_xy[1];

    // 计算月面贴图的北极（月球地理北极）相对于屏幕y轴的旋转角
    let tilt_rad = Math.atan2(xb-xa, -(yb-ya)); // 屏幕坐标系y向下为正
    let tilt_deg = normalize_angle(to_deg(tilt_rad));

    // 月面视圆盘的亮区拱点，在天球赤道坐标系背景上，相对于天北极方向向东的偏转角度
    let bright_pos_deg = moon_bright_limb_pos_angle(year, month, day, hour, minute, second, timezone);
    bright_pos_deg = normalize_angle(bright_pos_deg);
    // 假定月面亮区两端永远是月球的地理南北极
    bright_pos_deg = normalize_angle(tilt_deg - (bright_pos_deg-90)); // NOTE 仰视东西颠倒；亮区拱点和亮区的尖尖相差90度

    // 月相
    let moon_i = moon_phase(year, month, day, hour, minute, second, timezone);
    let phase_deg = normalize_angle(moon_i - 90);

    ////////////////////
    // 大气散射
    ////////////////////

    // 日光平均色相
    let sunlight_r = 255;
    let sunlight_g = 255;
    let sunlight_b = 255;

    // 天光平均色相
    let atmo_r = 0;
    let atmo_g = 0;
    let atmo_b = 0;

    // 大气散射未启用时，使用默认天空颜色（根据太阳高度）
    if (sun_alt > 10) {
        // 白天：蓝天
        atmo_r = 135;
        atmo_g = 206;
        atmo_b = 235;
    } else if (sun_alt > -6) {
        // 黄昏：橙黄色调
        atmo_r = 255;
        atmo_g = 180;
        atmo_b = 120;
    } else {
        // 夜晚：深蓝/黑色调
        atmo_r = 20;
        atmo_g = 30;
        atmo_b = 60;
    }

    if (enable_atmospheric_scattering > 0) {


        // 对天空半球进行采样，计算天光平均色相
        let atmo_count = 0;
        for (let ray_alt = 0.0; ray_alt < 30.0; ray_alt += 2.0) {
            for (let ray_azi = 0.0; ray_azi < 360.0; ray_azi += 10.0) {
                let _ray = horizontal_to_xyz(ray_azi, ray_alt, sky_radius);
                let _argb = calculate_scattered_pixel(_ray, sun_vec, enable_atmospheric_scattering);
                atmo_r += _argb[0] * 255;
                atmo_g += _argb[1] * 255;
                atmo_b += _argb[2] * 255;

                atmo_count++;
            }
        }
        atmo_r = (atmo_r / atmo_count) * 1.0;
        atmo_g = (atmo_g / atmo_count) * 1.0;
        atmo_b = (atmo_b / atmo_count) * 1.0;

        // 调整饱和度、明度拉满
        let hv = Math.max(atmo_r, atmo_g, atmo_b);
        let sat = 0.8;
        atmo_r = Math.max(1.0, sat * atmo_r + (1 - sat) * hv);
        atmo_g = Math.max(1.0, sat * atmo_g + (1 - sat) * hv);
        atmo_b = Math.max(1.0, sat * atmo_b + (1 - sat) * hv);
        let _k = 255.0 / hv;
        atmo_r = Math.min(255.0, atmo_r * _k);
        atmo_g = Math.min(255.0, atmo_g * _k);
        atmo_b = Math.min(255.0, atmo_b * _k);




        // 对太阳附近的天空进行采样，计算日光平均色相
        let sunlight_count = 0;
        for (let ray_alt = sun_alt - 20; ray_alt < sun_alt + 20; ray_alt += 2.0) {
            for (let ray_azi = sun_azi - 30; ray_azi < sun_azi + 30; ray_azi += 5.0) {
                let _ray = horizontal_to_xyz(normalize_angle(ray_azi), ray_alt, sky_radius);
                let _argb = calculate_scattered_pixel(_ray, sun_vec, enable_atmospheric_scattering);
                sunlight_r += _argb[0] * 255;
                sunlight_g += _argb[1] * 255;
                sunlight_b += _argb[2] * 255;

                sunlight_count++;
            }
        }
        sunlight_r = (sunlight_r / sunlight_count) * 1.0;
        sunlight_g = (sunlight_g / sunlight_count) * 1.0;
        sunlight_b = (sunlight_b / sunlight_count) * 1.0;

        // 调整饱和度、明度拉满
        let hv2 = Math.max(sunlight_r, sunlight_g, sunlight_b);
        let sat2 = 0.8;
        sunlight_r = Math.max(1.0, sat2 * sunlight_r + (1 - sat2) * hv2);
        sunlight_g = Math.max(1.0, sat2 * sunlight_g + (1 - sat2) * hv2);
        sunlight_b = Math.max(1.0, sat2 * sunlight_b + (1 - sat2) * hv2);
        let _k2 = 255.0 / hv2;
        sunlight_r = Math.min(255.0, sunlight_r * _k2);
        sunlight_g = Math.min(255.0, sunlight_g * _k2);
        sunlight_b = Math.min(255.0, sunlight_b * _k2);




        let C = 8; // 降采样因子
        if (sun_alt < -18.0) {
            C = (enable_opt_bilinear) ? 16 : 8;
        }
        else {
            C = (enable_opt_bilinear) ? 8 : 2;
        }

        for (let y = 0; y < fb_height; y+=C) {
            for (let x = 0; x < fb_width; x+=C) {

                // 观察者到该像素的方向向量（从屏幕坐标系转回地平天球的笛卡尔坐标系）
                let ray_vec = fisheye_unproject(x, y, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
                const ssp = calculate_scattered_pixel(ray_vec, sun_vec, enable_atmospheric_scattering);

                if (enable_opt_bilinear) {
                    set_pixel(frame_buffer, fb_width, fb_height, (x+0), (y+0), ssp[0]*255, ssp[1]*255, ssp[2]*255);
                }
                else {
                    for (let i = 0; i < C; i++) {
                        for (let j = 0; j < C; j++) {
                            set_pixel(frame_buffer, fb_width, fb_height, (x+j), (y+i), ssp[0]*255, ssp[1]*255, ssp[2]*255);
                        }
                    }
                }
            }
        }

        if (enable_opt_bilinear) {

            // 双线性插值以缓解块效应
            for (let y = 0; y < fb_height; y+=C) {
                for (let x = 0; x < fb_width; x+=C) {

                    // const r2 = (x-center_x)*(x-center_x) + (y-center_y)*(y-center_y);
                    // if (r2 > (sky_radius+C)*(sky_radius+C)) continue;

                    let idx_11 = ((y+0) * fb_width + (x+0)) * 4;
                    let idx_12 = ((y+0) * fb_width + (x+C)) * 4;
                    let idx_21 = ((y+C) * fb_width + (x+0)) * 4;
                    let idx_22 = ((y+C) * fb_width + (x+C)) * 4;

                    let r11 = frame_buffer[idx_11 + 0] ?? 0; let r12 = frame_buffer[idx_12 + 0] ?? 0; let r21 = frame_buffer[idx_21 + 0] ?? 0; let r22 = frame_buffer[idx_22 + 0] ?? 0;
                    let g11 = frame_buffer[idx_11 + 1] ?? 0; let g12 = frame_buffer[idx_12 + 1] ?? 0; let g21 = frame_buffer[idx_21 + 1] ?? 0; let g22 = frame_buffer[idx_22 + 1] ?? 0;
                    let b11 = frame_buffer[idx_11 + 2] ?? 0; let b12 = frame_buffer[idx_12 + 2] ?? 0; let b21 = frame_buffer[idx_21 + 2] ?? 0; let b22 = frame_buffer[idx_22 + 2] ?? 0;

                    // 检查并处理黑边
                    if (r11+b11+g11 === 0) {
                        if      (r22+b22+g22 != 0) { r11 = r22; g11 = g22; b11 = b22; }
                        else if (r12+b12+g12 != 0) { r11 = r12; g11 = g12; b11 = b12; }
                        else if (r21+b21+g21 != 0) { r11 = r21; g11 = g21; b11 = b21; }
                    }
                    if (r12+b12+g12 === 0) {
                        if      (r22+b22+g22 != 0) { r12 = r22; g12 = g22; b12 = b22; }
                        else if (r11+b11+g11 != 0) { r12 = r11; g12 = g11; b12 = b11; }
                        else if (r21+b21+g21 != 0) { r12 = r21; g12 = g21; b12 = b21; }
                    }
                    if (r21+b21+g21 === 0) {
                        if      (r22+b22+g22 != 0) { r21 = r22; g21 = g22; b21 = b22; }
                        else if (r11+b11+g11 != 0) { r21 = r11; g21 = g11; b21 = b11; }
                        else if (r12+b12+g12 != 0) { r21 = r12; g21 = g12; b21 = b12; }
                    }
                    if (r22+b22+g22 === 0) {
                        if      (r21+b21+g21 != 0) { r22 = r21; g22 = g21; b22 = b21; }
                        else if (r11+b11+g11 != 0) { r22 = r11; g22 = g11; b22 = b11; }
                        else if (r12+b12+g12 != 0) { r22 = r12; g22 = g12; b22 = b12; }
                    }

                    for (let i = 0; i < C; i++) {
                        for (let j = 0; j < C; j++) {
                            let idx = ((y+i) * fb_width + (x+j)) * 4;
                            let v = i/C;
                            let u = j/C;
                            frame_buffer[idx + 0] = (1-u)*(1-v)*r11 + u*(1-v)*r12 + (1-u)*v*r21 + u*v*r22;
                            frame_buffer[idx + 1] = (1-u)*(1-v)*g11 + u*(1-v)*g12 + (1-u)*v*g21 + u*v*g22;
                            frame_buffer[idx + 2] = (1-u)*(1-v)*b11 + u*(1-v)*b12 + (1-u)*v*b21 + u*v*b22;
                        }
                    }
                }
            }
        }
    }



    const moon_radius = Math.round(RADIUS * 0.1);

    draw_moon(
        frame_buffer, FB_WIDTH, FB_HEIGHT, moon_proj_xy[0], moon_proj_xy[1],
        0.8, moon_radius, phase_deg, bright_pos_deg, tilt_deg);


    const sun_radius = Math.round(RADIUS * 0.01);

    draw_sun(frame_buffer, FB_WIDTH, FB_HEIGHT, sun_proj_xy[0], sun_proj_xy[1], sun_alt, sun_radius);

    // 绘制星芒
    if (enable_star_burst && sun_alt > 0) {
        star_burst_filter(frame_buffer, FB_WIDTH, FB_HEIGHT, sun_proj_xy[0], sun_proj_xy[1], 0, 0.97, 160);
    }

    // 绘制恒星等其他天体
    const mag_offset = -2;
    for (let i = 0; i < STARS.length; i++) {
        const star_item = STARS[i];
        const star_ec = equatorial_to_horizontal(
                            ra_hms_to_deg(star_item[0], star_item[1], star_item[2]),
                            dec_dms_to_decimal(star_item[3], star_item[4], star_item[5]),
                            year, month, day, hour, minute, second, timezone, longitude, latitude);

        const proj_xy = fisheye_project(star_ec[1], star_ec[0], RADIUS, center_x, center_y, view_alt, view_azi, view_roll, f);
        const mag = Math.random() * 0.5 + mag_offset + star_item[6];
        draw_star(frame_buffer, FB_WIDTH, FB_HEIGHT, proj_xy[0], proj_xy[1], mag, 1, 255, 255, 255);
        if (enable_star_name) {
            fb_draw_textline(frame_buffer, fb_width, fb_height, STAR_NAME[i], proj_xy[0]+3, proj_xy[1]+3, 255, 255, 255, 1);
        }
    }

    // 绘制黄道
    if (enable_ecliptic_circle) {
        draw_ecliptic_circle(
            frame_buffer, fb_width, fb_height,
            sky_radius, center_x, center_y,
            view_alt, view_azi, view_roll, f,
            6, 16, 16, 0,
            year, month, day, hour, minute, second, timezone, longitude, latitude
        );
    }

    // 绘制大行星
    if (enable_planet) {
        for (let i = 8; i >= 1; i--) { // 之所以倒数，是为了让靠近太阳的行星后绘制，使其覆盖在远离太阳的行星上面
            if (i == 3) continue; // 跳过地球

            const planet_hc = where_is_the_planet(year, month, day, hour, minute, second, timezone, longitude, latitude, i);
            const planet_azi = planet_hc[1];
            const planet_alt = planet_hc[0];

            const planet_proj_xy = fisheye_project(planet_azi, planet_alt, RADIUS, center_x, center_y, view_alt, view_azi, view_roll, f);
            const planet_proj_x = planet_proj_xy[0];
            const planet_proj_y = planet_proj_xy[1];

            draw_star(frame_buffer, FB_WIDTH, FB_HEIGHT, planet_proj_x, planet_proj_y,
                0, PLANET_RADIUS[i], PLANET_COLOR_R[i], PLANET_COLOR_G[i], PLANET_COLOR_B[i]);

            // if (enable_planet_name) {
            if (enable_star_name) {
                fb_draw_textline(frame_buffer, fb_width, fb_height, PLANET_NAME[i], planet_proj_x+3, planet_proj_y+3, PLANET_COLOR_R[i], PLANET_COLOR_G[i], PLANET_COLOR_B[i], 1);
            }
        }
    }


    // 更新体积云时间偏移
    // cloudTimeOffset += 1000 / 60; // 假设60fps

    // 渲染体积云（在大气散射之后，天体之前）
    render_volumetric_clouds(
        frame_buffer, fb_width, fb_height,
        sky_radius, center_x, center_y,
        view_alt, view_azi, view_roll, f,
        sun_alt, sun_azi, cloudTimeOffset,
        atmo_r, atmo_g, atmo_b,
        // 255, 207, 164
        sunlight_r, sunlight_g, sunlight_b
    );


    // 绘制赤道坐标网格
    if (enable_equatorial_coord) {
        // 绘制赤道天球子午圈
        for (let i = 0; i < 24; i += 2) {
            let line_width = (i === 0 || i == 12) ? 3 : 2;
            draw_celestial_circle(
                frame_buffer, FB_WIDTH, FB_HEIGHT,
                sky_radius, center_x, center_y,
                view_alt, view_azi, view_roll, f,
                true, i, null,
                line_width, 8, 16, 32,
                year, month, day, hour, minute, second, timezone, longitude, latitude
            );
        }
        // 绘制赤道天球等纬度圈
        for (let i = -90; i < 90; i += 10) {
            let line_width = (i === 0) ? 3 : 2;
            draw_celestial_circle(
                frame_buffer, FB_WIDTH, FB_HEIGHT,
                sky_radius, center_x, center_y,
                view_alt, view_azi, view_roll, f,
                false, null, i,
                line_width, 8, 16, 32,
                year, month, day, hour, minute, second, timezone, longitude, latitude
            );
        }
    }

    // 绘制方位文字
    if (enable_horizontal_coord) {
        let lable_north = fisheye_project(0, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "北", lable_north[0], lable_north[1], 255, 0, 0, 1);
        let lable_east = fisheye_project(90, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "东", lable_east[0], lable_east[1], 255, 0, 0, 1);
        let lable_south = fisheye_project(180, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "南", lable_south[0], lable_south[1], 255, 0, 0, 1);
        let lable_west = fisheye_project(270, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "西", lable_west[0], lable_west[1], 255, 0, 0, 1);

        let lable_pos = fisheye_project(30, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "30", lable_pos[0], lable_pos[1], 255, 0, 0, 1);
        lable_pos = fisheye_project(60, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "60", lable_pos[0], lable_pos[1], 255, 0, 0, 1);
        lable_pos = fisheye_project(120, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "120", lable_pos[0], lable_pos[1], 255, 0, 0, 1);
        lable_pos = fisheye_project(150, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "150", lable_pos[0], lable_pos[1], 255, 0, 0, 1);
        lable_pos = fisheye_project(210, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "210", lable_pos[0], lable_pos[1], 255, 0, 0, 1);
        lable_pos = fisheye_project(240, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "240", lable_pos[0], lable_pos[1], 255, 0, 0, 1);
        lable_pos = fisheye_project(300, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "300", lable_pos[0], lable_pos[1], 255, 0, 0, 1);
        lable_pos = fisheye_project(330, 6, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
        fb_draw_textline_centered(frame_buffer, fb_width, fb_height, "330", lable_pos[0], lable_pos[1], 255, 0, 0, 1);

    }

    // 绘制地景（天空投影圆盘之外的部分）
    if (landscape_index === 0 || LANDSCAPES[landscape_index][2] === 0) {
        let fov = (0.45/90) * Math.abs(sun_alt) + 1.1;
        update_landscape(fov);
    }
    draw_horizon(
        frame_buffer, FB_WIDTH, FB_HEIGHT, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f, sun_alt,
        (LANDSCAPES[landscape_index][2] === 0), atmo_r, atmo_g, atmo_b);

    // 绘制地平坐标网格
    // if (enable_horizontal_coord) {
    //     draw_circle_outline(frame_buffer, FB_WIDTH, FB_HEIGHT, RADIUS, RADIUS, RADIUS-1, 2, 128, 128, 128, 255);
    //     draw_circle_outline(frame_buffer, FB_WIDTH, FB_HEIGHT, RADIUS, RADIUS, RADIUS / 3, 1, 16, 16, 16, 255);
    //     draw_circle_outline(frame_buffer, FB_WIDTH, FB_HEIGHT, RADIUS, RADIUS, RADIUS / 3 * 2, 1, 16, 16, 16, 255);
    //     draw_line(frame_buffer, FB_WIDTH, FB_HEIGHT, RADIUS, 0, RADIUS, RADIUS*2, 1, 16, 16, 16);
    //     draw_line(frame_buffer, FB_WIDTH, FB_HEIGHT, 0, RADIUS, RADIUS*2, RADIUS, 1, 16, 16, 16);
    // }

    // 绘制姿态仪相关符号
    if (enable_att_indicator === true) {
        draw_rectangle(frame_buffer, fb_width, fb_height, (center_x - 60), center_y - 2, 50, 4, 255, 255, 0, 1);
        draw_rectangle(frame_buffer, fb_width, fb_height, (center_x - 14), center_y - 2, 4, 10, 255, 255, 0, 1);
        draw_rectangle(frame_buffer, fb_width, fb_height, (center_x + 10), center_y - 2, 50, 4, 255, 255, 0, 1);
        draw_rectangle(frame_buffer, fb_width, fb_height, (center_x + 10), center_y - 2, 4, 10, 255, 255, 0, 1);
        draw_rectangle(frame_buffer, fb_width, fb_height, (center_x - 1), center_y - 1, 2, 2, 255, 255, 0, 1);
    }


    // fb_draw_textline(frame_buffer, fb_width, fb_height, "玲珑天象仪 V2603 (c) BD4SUR", 1, 226, 64, 64, 64, 3);
    // let timestr = `${year}-${String(100+month).substr(-2)}-${String(100+day).substr(-2)} ${String(100+hour).substr(-2)}:${String(100+minute).substr(-2)}:${String(100+second).substr(-2)}`;
    // fb_draw_textline(frame_buffer, fb_width, fb_height, timestr, 200, 226, 128, 128, 128, 3);

}

class SkyCanvas {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        // 关闭图像平滑处理
        this.ctx.imageSmoothingEnabled = false; 
        // 兼容旧浏览器
        this.ctx.mozImageSmoothingEnabled = false;
        this.ctx.webkitImageSmoothingEnabled = false;
        this.ctx.msImageSmoothingEnabled = false;

        this.canvas.width = FB_WIDTH;
        this.canvas.height = FB_HEIGHT;

        function adaptRatio(context) {
            var devicePixelRatio = window.devicePixelRatio || 1;
            var backingStoreRatio = context.webkitBackingStorePixelRatio || context.mozBackingStorePixelRatio || context.msBackingStorePixelRatio || context.oBackingStorePixelRatio || context.backingStorePixelRatio || 1;
            return devicePixelRatio / backingStoreRatio;
        }
        this.RATIO = 1; // adaptRatio(this.ctx);
        this.canvas.width = Math.floor(this.canvas.width * this.RATIO);
        this.canvas.height = Math.floor(this.canvas.height * this.RATIO);

        RADIUS = Math.floor(RADIUS * this.RATIO);
        FB_WIDTH = Math.floor(FB_WIDTH * this.RATIO);
        FB_HEIGHT = Math.floor(FB_HEIGHT * this.RATIO);
        center_x = Math.floor(center_x * this.RATIO);
        center_y = Math.floor(center_y * this.RATIO);
        sky_radius = Math.floor(sky_radius * this.RATIO);
    }
}



function load_landscape_texture(idx) {
    if (idx === 0) {
        generate_landscape(landscape_global_rgba, landscape_global_width, landscape_global_height, Math.random(), 0.02, 6);
        to_fisheye(landscape_global_rgba, landscape_texture_rgba, landscape_texture_width, landscape_texture_height, 1.3);
    }
    else {
        img_landscape_texture.src = LANDSCAPES[idx][0];
        img_landscape_texture.onload = () => {

    // 改进环架锁问题
    // https://stackoverflow.com/a/75897568 Posted by Oddwarg

    function getRotationMatrix( alpha, beta, gamma ) {
        const degtorad = Math.PI / 180; // Degree-to-Radian conversion
        var cX = Math.cos( beta  * degtorad );
        var cY = Math.cos( gamma * degtorad );
        var cZ = Math.cos( alpha * degtorad );
        var sX = Math.sin( beta  * degtorad );
        var sY = Math.sin( gamma * degtorad );
        var sZ = Math.sin( alpha * degtorad );

        var m11 = cZ * cY - sZ * sX * sY;
        var m12 = - cX * sZ;
        var m13 = cY * sZ * sX + cZ * sY;

        var m21 = cY * sZ + cZ * sX * sY;
        var m22 = cZ * cX;
        var m23 = sZ * sY - cZ * cY * sX;

        var m31 = - cX * sY;
        var m32 = sX;
        var m33 = cX * cY;

        return [
            m13, m11, m12,
            m23, m21, m22,
            m33, m31, m32
        ];
    }

    function getEulerAngles( matrix ) {
        var radtodeg = 180 / Math.PI; // Radian-to-Degree conversion
        var sy = Math.sqrt(matrix[0] * matrix[0] +  matrix[3] * matrix[3] );
    
        var singular = sy < 1e-6; // If
    
        if (!singular) {
            var x = Math.atan2(matrix[7] , matrix[8]);
            var y = Math.atan2(-matrix[6], sy);
            var z = Math.atan2(matrix[3], matrix[0]);
        } else {
            var x = Math.atan2(-matrix[5], matrix[4]);
            var y = Math.atan2(-matrix[6], sy);
            var z = 0;
        }
        return [radtodeg * x, radtodeg * y, radtodeg * z];
    }

    function quaternionToEuler(q) {
        const [x, y, z, w] = q;
        const yaw = Math.atan2(
            2 * (w * z + x * y),
            1 - 2 * (y * y + z * z)
        );
        const pitch = Math.asin(
            Math.max(-1, Math.min(1, 2 * (w * y - z * x)))
        );
        const roll = Math.atan2(
            2 * (w * x + y * z),
            1 - 2 * (x * x + y * y)
        );
        const toDegrees = rad => rad * (180 / Math.PI);
        return {
            yaw: toDegrees(yaw),
            pitch: toDegrees(pitch),
            roll: toDegrees(roll)
        };
    }

    if ('AbsoluteOrientationSensor' in window) {
        const sensor = new AbsoluteOrientationSensor({ frequency: 60 });

        sensor.addEventListener('reading', () => {
            const euler = quaternionToEuler(sensor.quaternion);

            let alpha = euler.yaw;
            let beta = euler.pitch;
            let gamma = euler.roll;

            let rotation = getEulerAngles(getRotationMatrix(alpha, beta, gamma));

            view_alt = rotation[1];
            view_azi = normalize_angle(-rotation[2]);
            view_roll = rotation[0];

            document.getElementById("quaternion").innerHTML = ` | euler:${euler}`;
        });

        sensor.start();
    }


    const sky = new SkyCanvas('skyCanvas');
    const imageData = sky.ctx.createImageData(sky.canvas.width, sky.canvas.height);
    const frame_buffer = imageData.data;

    const canvas = sky.canvas;
    const ctx = sky.ctx;



    // 获取事件在 Canvas 内的 CSS 像素坐标
    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;

        if (e.type.startsWith('touch')) {
            const touch = e.touches[0] || e.changedTouches[0];
            clientX = touch.clientX;
            clientY = touch.clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        // 转换为 Canvas 内的 CSS 像素坐标（非物理像素）
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width) / sky.RATIO,
            y: (clientY - rect.top) * (canvas.height / rect.height) / sky.RATIO
        };
    }

    // 开始绘制
    function startDrawing(e) {
        e.preventDefault(); // 阻止触摸默认行为（滚动/缩放）
        isDrawing = true;
        const pos = getCanvasPos(e);

        let xyz = fisheye_unproject(pos.x, pos.y, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, view_range);
        let hc = xyz_to_horizontal(xyz[0], xyz[1], xyz[2]);
        last_point_alt = hc[0];
        last_point_azi = hc[1];

    }

    // 绘制中
    function drag(e) {
        if (!isDrawing) return;
        e.preventDefault(); // 阻止触摸滚动
        const pos = getCanvasPos(e);

        let view_dir = find_view_dir(last_point_alt, last_point_azi, sky_radius, pos.x, pos.y, center_x, center_y, view_roll, view_range, view_alt, view_azi);

        view_alt = view_dir[0];
        view_azi = view_dir[1];

        let xyz = fisheye_unproject(pos.x, pos.y, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, view_range);
        let hc = xyz_to_horizontal(xyz[0], xyz[1], xyz[2]);
        last_point_alt = hc[0];
        last_point_azi = hc[1];

        document.getElementById("view_pitch").innerHTML = String(Math.round((view_alt <= 90 && view_alt >= -90) ? view_alt : (180-view_alt)));
        document.getElementById("view_yaw").innerHTML = String(Math.round(view_azi));
        document.getElementById("view_roll").innerHTML = String(Math.round(view_roll));
        document.getElementById("view_range").innerHTML = String(view_range.toFixed(1));
    }

    // 停止绘制
    function stopDrawing() {
        isDrawing = false;
    }

    // 事件绑定
    sky.canvas.addEventListener('mousedown', startDrawing);
    sky.canvas.addEventListener('mousemove', drag);
    sky.canvas.addEventListener('mouseup', stopDrawing);
    sky.canvas.addEventListener('mouseout', stopDrawing); // 鼠标移出 Canvas 停止绘制

    // 触摸事件（移动端）
    sky.canvas.addEventListener('touchstart', startDrawing, { passive: false });
    sky.canvas.addEventListener('touchmove', drag, { passive: false });
    sky.canvas.addEventListener('touchend', stopDrawing);
    sky.canvas.addEventListener('touchcancel', stopDrawing);

    // FPS计算相关
    let frameCount = 0;
    let lastTime = performance.now();
    let fps = 0;

    function draw() {
        // 每帧重绘
        frame_buffer.fill(0);
        for (let i = 3; i < sky.canvas.width * sky.canvas.height * 4; i+=4) {
            frame_buffer[i] = 255;
        }

        if (enable_realtime) {
            const current_date = new Date();
            day = current_date.getDate();
            month = current_date.getMonth() + 1;
            year = current_date.getFullYear();
            second = current_date.getSeconds();
            minute = current_date.getMinutes();
            hour = current_date.getHours();
        }
        else {
            if (enable_timemachine_running) {
                const new_date = new Date();
                new_date.setTime(timemachine_start_time.getTime() + counter);
                day = new_date.getDate();
                month = new_date.getMonth() + 1;
                year = new_date.getFullYear();
                second = new_date.getSeconds();
                minute = new_date.getMinutes();
                hour = new_date.getHours();

                counter += 120000;
            }
        }

        let timestr = `${year}-${String(100+month).substr(-2)}-${String(100+day).substr(-2)} ${String(100+hour).substr(-2)}:${String(100+minute).substr(-2)}:${String(100+second).substr(-2)}`;
        document.getElementById('datetime').innerHTML = timestr;

        render_all(
            frame_buffer, sky.canvas.width, sky.canvas.height,
            RADIUS, center_x, center_y,
            view_alt, view_azi, view_roll, view_range,
            year, month, day, hour, minute, second, timezone, longitude, latitude);

        sky.ctx.putImageData(imageData, 0, 0);

        // 计算FPS计算
        frameCount++;
        const now = performance.now();
        if (now - lastTime >= 500) { // 每隔多少毫秒统计一次
            fps = Math.round((frameCount * 1000) / (now - lastTime));
            document.getElementById('fps').textContent = `${fps}`;
            frameCount = 0;
            lastTime = now;
        }

        requestAnimationFrame(draw);
    }

    draw();

    refresh_button_status();
};
