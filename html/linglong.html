// 从星等转换为相对亮度（归一化到 [0,1]，mag=0 → 1.0，mag=6 → ~0.01）
// 增加一个衰减系数（平均蓝天亮度），以便白天能够掩盖亮星
function magnitude_to_relative_luminance(mag) {
    return 0.7 * Math.pow(10, -0.4 * mag);
}

function to_rad(deg) {
    return deg * Math.PI / 180;
}

function to_deg(rad) {
    return rad * 180 / Math.PI;
}

// 将hms格式的赤经转为度数
function ra_hms_to_deg(h, m, s) {
    let totalHours = h + m / 60.0 + s / 3600.0;
    let degrees = totalHours * 15.0;
    degrees = degrees % 360;
    if (degrees < 0) degrees += 360;
    return degrees;
}

// 将度分秒格式的赤纬转为度数
function dec_dms_to_decimal(d, m, s) {
    const sign = d < 0 ? -1 : 1;
    const absD = Math.abs(d);
    const decimal = sign * (absD + m / 60 + s / 3600);
    return decimal;
}

// 地平天球的球坐标系→地平天球的笛卡尔坐标系
function horizontal_to_xyz(azimuth_deg, altitude_deg, radius) {
    const alt_rad = altitude_deg * Math.PI / 180;
    const azi_rad = azimuth_deg * Math.PI / 180;
    const r_xy = radius * Math.cos(alt_rad);
    return [
        r_xy * Math.sin(azi_rad),
        r_xy * Math.cos(azi_rad),
        radius * Math.sin(alt_rad)
    ];
}

// 笛卡尔坐标系 → 地平天球球坐标系 (altitude, azimuth, radius)
function xyz_to_horizontal(x, y, z) {
    // 1. 计算半径（处理原点情况）
    const R = Math.sqrt(x * x + y * y + z * z);
    if (R < 1e-15) {
        return [0, 0, 0]; // 原点无定义，返回默认值
    }

    // 2. 计算高度角（钳制避免浮点误差导致 asin 越界）
    let sinAlt = z / R;
    sinAlt = Math.max(-1, Math.min(1, sinAlt)); // 严格限制在 [-1, 1]
    const altitude_deg = Math.asin(sinAlt) * (180 / Math.PI);

    // 3. 处理天顶/天底（|z| ≈ R 时方位角无定义）
    if (Math.abs(z) >= R * (1 - 1e-10)) {
        return [altitude_deg, 0, R]; // 方位角设为0（惯例）
    }

    // 4. 计算方位角（核心：atan2(x, y) 对应原函数中的 azRad）
    const azRad = Math.atan2(x, y); // 注意参数顺序：x 对应 sin(azRad), y 对应 cos(azRad)
    let azimuth_deg = azRad * (180 / Math.PI) - 180; // 逆向抵消原函数的 +180°

    // 5. 归一化到 [0, 360)
    azimuth_deg = (azimuth_deg + 360) % 360;
    if (azimuth_deg >= 360) azimuth_deg -= 360; // 双保险（应对浮点误差）
    if (azimuth_deg < 0) azimuth_deg += 360;

    return [altitude_deg, azimuth_deg, R];
}


function cross(a, b) {
    return [
        a[1] * b[2] - a[2] * b[1],
        a[2] * b[0] - a[0] * b[2],
        a[0] * b[1] - a[1] * b[0]
    ];
}
function dot(a, b) {
    return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
}
function scale(v, n) {
    return [v[0] * n, v[1] * n, v[2] * n];
}
function sub(a, b) {
    return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
}
function add(a, b) {
    return [a[0] + b[0], a[1] + b[1], a[2] + b[2]];
}
function norm(v) {
    const len = Math.hypot(v[0], v[1], v[2]);
    return (len < 1e-20) ? [0, 0, 0] : [v[0]/len, v[1]/len, v[2]/len];
}


// 地平天球的球坐标系→地平天球的笛卡尔坐标系→投影到地面投影坐标系
function fisheye_project(azimuth_deg, altitude_deg, R, center_x, center_y, view_alt, view_azi, view_roll, f) {

    let v_view = norm(horizontal_to_xyz(view_azi, view_alt, R));
    let v = norm(horizontal_to_xyz(azimuth_deg, altitude_deg, R));

    let x_v = [0,0,0];
    let y_v = [0,0,0];

    // if (Math.abs(view_alt - 90) < 1e-5) { // 谨慎处理临界点附近的浮点误差问题
    //     v_view = [0, 0, 1];
    //     // NOTE 如果强行设置y_v，将失去天顶视角的旋转（某种 gimble lock？）
    //     y_v = [0, 1, 0]; // NOTE 方向的选择有任意性，与默认方向与坐标反解有关
    // }
    // else {
        let zenith = [0, 0, 1];
        let proj = scale(v_view, dot(zenith, v_view));
        y_v = norm(sub(zenith, proj));
    // }

    x_v = cross(y_v, v_view);

    // 画面滚转
    let roll_rad = view_roll * Math.PI / 180.0;
    let cos_roll = Math.cos(roll_rad);
    let sin_roll = Math.sin(roll_rad);
    let xv_rot = sub(scale(x_v, cos_roll), scale(y_v, sin_roll));
    let yv_rot = add(scale(x_v, sin_roll), scale(y_v, cos_roll));

    let vx = dot(v, xv_rot);
    let vy = dot(v, yv_rot);
    let vz = dot(v, v_view);

    if (vz < -1) return [0, 0];

    const theta = Math.acos(vz); // rad
    const phi_v = -Math.atan2(vx, vy); // rad
    const r = (f * 2.0 * R / Math.PI) * theta;
    const x =  r * Math.sin(phi_v);
    const y = -r * Math.cos(phi_v);
    return [x + center_x, y + center_y];
}

function fisheye_unproject(scr_x, scr_y, R, center_x, center_y, view_alt, view_azi, view_roll, f) {
    // 屏幕坐标转极坐标
    const dx = center_x - scr_x;
    const dy = center_y - scr_y;
    const r = Math.hypot(dx, dy);

    // 处理中心点退化
    let phi_prime = 0.0;
    if (r < 1e-6) {
        phi_prime = 0.0;
    }
    else {
        phi_prime = Math.atan2(dx, dy);
    }

    // 极坐标转单位向量
    let theta = (Math.PI / 2) * (r / (R * f));
    let pxy = Math.sin(theta);
    let p_prime = [
        pxy * Math.sin(phi_prime),
        pxy * Math.cos(phi_prime),
        Math.cos(theta)
    ];

    // 构建旋转矩阵转置
    let V_alt_rad = to_rad(view_alt);
    let V_azi_rad = to_rad(view_azi);

    // 视线向量v
    let v = [
        Math.cos(V_alt_rad) * Math.sin(V_azi_rad),
        Math.cos(V_alt_rad) * Math.cos(V_azi_rad),
        Math.sin(V_alt_rad)
    ];

    // 构建y'轴
    let dot = v[2]; // dot(zenith=[0,0,1], v) => vz
    let y_prime = [-dot * v[0], -dot * v[1], 1.0 - dot * v[2]];
    y_prime = norm(y_prime);

    // 构建x'轴
    let x_prime = cross(y_prime, v);
    x_prime = norm(x_prime);


    // 画面滚转
    let roll_rad = view_roll * Math.PI / 180.0;
    let cos_roll = Math.cos(roll_rad);
    let sin_roll = Math.sin(roll_rad);
    let x_prime_rot = sub(scale(x_prime, cos_roll), scale(y_prime, sin_roll));
    let y_prime_rot = add(scale(x_prime, sin_roll), scale(y_prime, cos_roll));


    // 局部坐标转地平坐标
    let px = x_prime_rot[0] * p_prime[0] + y_prime_rot[0] * p_prime[1] + v[0] * p_prime[2];
    let py = x_prime_rot[1] * p_prime[0] + y_prime_rot[1] * p_prime[1] + v[1] * p_prime[2];
    let pz = x_prime_rot[2] * p_prime[0] + y_prime_rot[2] * p_prime[1] + v[2] * p_prime[2];

    // 归一化到R
    return scale(norm([px, py, pz]), R);
}











// 通过屏幕坐标和地平方位坐标，反解视线方向
function find_view_dir(alt, azi, R, x, y, center_x, center_y, view_roll, f, last_alt = 90, last_azi = 0) {

    // ===== 将last参数转换为单位向量（用于解选择）=====
    let last_vec;
    try {
        // last_alt是view_alt格式（0-180），需转为常规仰角：常规仰角 = 180 - view_alt
        const last_conventional_alt = 180 - last_alt;
        last_vec = norm(horizontal_to_xyz(last_azi, last_conventional_alt, 1.0));
        // 验证有效性
        if (!isFinite(last_vec[0]) || Math.abs(dot(last_vec, last_vec) - 1) > 1e-6) throw new Error();
    } catch (e) {
        // 回退到天顶（安全默认值）
        last_vec = [0, 0, 1];
    }
    
    // ===== 主逻辑：解析求解 =====
    // 1. 目标点单位向量
    const P = norm(horizontal_to_xyz(azi, alt, 1.0));
    
    // 2. 投影偏移处理
    const _dx = x - center_x;
    const _dy = y - center_y;
    const r = Math.hypot(_dx, _dy);

    // 旋转恢复
    let roll_rad = -view_roll * Math.PI / 180.0;
    let dx = _dx * Math.cos(roll_rad) - _dy * Math.sin(roll_rad);
    let dy = _dx * Math.sin(roll_rad) + _dy * Math.cos(roll_rad);

    // 特殊情况：投影中心点
    if (r < 1e-10) {
        const view_alt = 180 - alt;
        return [view_alt, (azi % 360 + 360) % 360];
    }
    
    // 3. 计算球面参数
    let theta = r * Math.PI / (2 * f * R);
    theta = Math.max(0, Math.min(Math.PI, theta));
    const phi_v = Math.atan2(dx, -dy); // 由投影公式反推
    const k = Math.sin(theta) * Math.cos(phi_v);
    const c = P[2]; // P·Z
    const cos_theta = Math.cos(theta);
    
    // 4. 求解二次方程 A·a² + B·a + C = 0 (a = S·Z)
    const A = cos_theta * cos_theta + k * k;
    const B = -2 * c * cos_theta;
    const C = c * c - k * k;
    const discriminant = B * B - 4 * A * C;
    
    // 无实数解时直接进入数值优化
    if (discriminant < -1e-12) {
        return find_view_dir_numerical(alt, azi, R, x, y, center_x, center_y, view_roll, f, last_alt, last_azi);
    }
    
    // 5. 生成候选解
    const candidates = [];
    const sqrt_disc = Math.sqrt(Math.max(0, discriminant));
    const a_candidates = [
        (-B + sqrt_disc) / (2 * A),
        (-B - sqrt_disc) / (2 * A)
    ];
    
    for (const a_raw of a_candidates) {
        const a = Math.max(-1, Math.min(1, a_raw));
        const R0_sq = 1 - a * a;
        if (R0_sq < -1e-10) continue;
        const R0 = Math.sqrt(Math.max(0, R0_sq));
        
        const D = cos_theta - a * c;
        const Px = P[0], Py = P[1];
        const len_sq = Px * Px + Py * Py;
        
        // P在z轴上的特殊情况
        if (len_sq < 1e-20) {
            if (Math.abs(D) > 1e-8) continue;
            if (R0 < 1e-10) candidates.push([0, 0, a]);
            else {
                candidates.push([0, R0, a]);
                candidates.push([0, -R0, a]);
            }
            continue;
        }
        
        const len = Math.sqrt(len_sq);
        const nx = Px / len, ny = Py / len;
        const dist = Math.abs(D) / len;
        if (dist > R0 + 1e-8) continue;
        
        const base_x = (D / len) * nx;
        const base_y = (D / len) * ny;
        const tx = -ny, ty = nx;
        const h = Math.sqrt(Math.max(0, R0_sq - (D * D) / len_sq));
        
        candidates.push([base_x + h * tx, base_y + h * ty, a]);
        candidates.push([base_x - h * tx, base_y - h * ty, a]);
    }
    
    // 6. 验证候选解（消除增根）
    const valid_candidates = [];
    for (const S_raw of candidates) {
        const S = norm(S_raw);
        if (!isFinite(S[0])) continue;
        
        const a = S[2];
        const left = c - a * cos_theta;
        const right = k * Math.sqrt(Math.max(0, 1 - a * a));
        
        // 符号与数值验证（容忍浮点误差）
        if (Math.abs(left - right) < 1e-6 * (Math.abs(left) + Math.abs(right) + 1)) {
            valid_candidates.push(S);
        }
    }
    
    // 7. 优先选择与last最接近的有效解
    if (valid_candidates.length > 0) {
        // 按与last_vec的角距离升序排序
        valid_candidates.sort((s1, s2) => {
            const cos1 = Math.max(-1, Math.min(1, dot(s1, last_vec)));
            const cos2 = Math.max(-1, Math.min(1, dot(s2, last_vec)));
            return Math.acos(cos1) - Math.acos(cos2);
        });
        
        // 转换最优解为view_alt/view_azi格式
        const S = valid_candidates[0];
        const sz = Math.max(-1, Math.min(1, S[2]));
        const alt_s = Math.asin(sz) * 180 / Math.PI; // 常规仰角
        let azi_s = Math.atan2(S[0], S[1]) * 180 / Math.PI;
        
        const view_alt = 180 - alt_s;
        azi_s = (azi_s % 360 + 360) % 360;
        return [view_alt, azi_s];
    }
    
    // 8. 解析法失败：调用数值优化（传入last参数）
    return find_view_dir_numerical(alt, azi, R, x, y, center_x, center_y, view_roll, f, last_alt, last_azi);
}

// ===== 数值优化后备方案（增强：使用last作为初始点）=====
function find_view_dir_numerical(alt, azi, R, x, y, center_x, center_y, view_roll, f, last_alt, last_azi) {

    console.log("find_view_dir_numerical");

    // 投影计算（简化版）
    function fisheye_project(view_alt, view_azi, view_roll) {
        const v_view = norm(horizontal_to_xyz(view_azi, 180 - view_alt, 1));
        const v = norm(horizontal_to_xyz(azi, alt, 1));
        
        let y_v;
        if (Math.abs(view_alt - 90) < 1e-5) {
            y_v = [0, 1, 0];
        } else {
            const zenith = [0, 0, 1];
            const proj_scale = dot(zenith, v_view);
            const proj = [v_view[0]*proj_scale, v_view[1]*proj_scale, v_view[2]*proj_scale];
            y_v = norm([zenith[0]-proj[0], zenith[1]-proj[1], zenith[2]-proj[2]]);
        }
        const x_v = cross(y_v, v_view);
        
        const vx = dot(v, x_v);
        const vy = dot(v, y_v);
        const vz = dot(v, v_view);
        if (vz <= -1) return [center_x, center_y];
        
        const theta = Math.acos(Math.max(-1, Math.min(1, vz)));
        const phi_v = -Math.atan2(vx, vy);
        const r_proj = (f * 2 * R / Math.PI) * theta;
        return [
            r_proj * Math.sin(phi_v) + center_x,
            -r_proj * Math.cos(phi_v) + center_y
        ];
    }
    
    // ===== 关键增强：以last为初始点构建单纯形 =====
    const alt0 = Math.max(0, Math.min(180, last_alt));
    const azi0 = (last_azi % 360 + 360) % 360;
    
    // 构建非退化单纯形（last为中心，两个小扰动）
    let simplex = [
        [alt0, azi0], // 最优猜测点
        [Math.max(0, Math.min(180, alt0 + 5)), azi0], // 仰角扰动
        [alt0, (azi0 + 15) % 360] // 方位角扰动（避免与仰角扰动共线）
    ];
    
    // Nelder-Mead优化（精简版）
    const max_iter = 80;
    const tol = 1e-4;
    
    for (let iter = 0; iter < max_iter; iter++) {
        // 计算投影误差
        const errors = simplex.map(p => {
            const [px, py] = fisheye_project(p[0], p[1], view_roll);
            return Math.hypot(px - x, py - y);
        });
        
        // 排序：best → worst
        const indices = [0,1,2].sort((i,j) => errors[i] - errors[j]);
        simplex = [simplex[indices[0]], simplex[indices[1]], simplex[indices[2]]];
        errors.sort((a,b) => a - b);
        
        if (errors[2] - errors[0] < tol) break;
        
        // 计算centroid（除最差点外）
        const centroid = [
            (simplex[0][0] + simplex[1][0]) / 2,
            (simplex[0][1] + simplex[1][1]) / 2
        ];
        
        // 反射
        const reflected = [
            2*centroid[0] - simplex[2][0],
            2*centroid[1] - simplex[2][1]
        ];
        reflected[0] = Math.max(0, Math.min(180, reflected[0]));
        reflected[1] = (reflected[1] % 360 + 360) % 360;
        
        const ref_err = (() => {
            const [px, py] = fisheye_project(reflected[0], reflected[1], view_roll);
            return Math.hypot(px - x, py - y);
        })();
        
        // 标准Nelder-Mead操作
        if (ref_err < errors[0]) {
            // 扩展
            const expanded = [
                centroid[0] + 2*(reflected[0] - centroid[0]),
                centroid[1] + 2*(reflected[1] - centroid[1])
            ];
            expanded[0] = Math.max(0, Math.min(180, expanded[0]));
            expanded[1] = (expanded[1] % 360 + 360) % 360;
            const exp_err = (() => {
                const [px, py] = fisheye_project(expanded[0], expanded[1], view_roll);
                return Math.hypot(px - x, py - y);
            })();
            simplex[2] = exp_err < ref_err ? expanded : reflected;
        } else if (ref_err < errors[1]) {
            simplex[2] = reflected;
        } else {
            // 收缩
            const contracted = [
                centroid[0] + 0.5*(simplex[2][0] - centroid[0]),
                centroid[1] + 0.5*(simplex[2][1] - centroid[1])
            ];
            contracted[0] = Math.max(0, Math.min(180, contracted[0]));
            contracted[1] = (contracted[1] % 360 + 360) % 360;
            const cont_err = (() => {
                const [px, py] = fisheye_project(contracted[0], contracted[1], view_roll);
                return Math.hypot(px - x, py - y);
            })();
            if (cont_err < errors[2]) {
                simplex[2] = contracted;
            } else {
                // 全局收缩（向best点）
                for (let i = 1; i < 3; i++) {
                    simplex[i] = [
                        simplex[0][0] + 0.5*(simplex[i][0] - simplex[0][0]),
                        simplex[0][1] + 0.5*(simplex[i][1] - simplex[0][1])
                    ];
                    simplex[i][0] = Math.max(0, Math.min(180, simplex[i][0]));
                    simplex[i][1] = (simplex[i][1] % 360 + 360) % 360;
                }
            }
        }
    }
    
    // 返回最优解（已归一化）
    const best = simplex[0];
    return [
        Math.max(0, Math.min(180, best[0])),
        (best[1] % 360 + 360) % 360
    ];
}





















// 地平天球的球坐标系→地平天球的笛卡尔坐标系→投影到地面投影坐标系
function horizontal_to_screen_xy(azimuth_deg, altitude_deg, R, center_x, center_y) {
    // 鱼眼投影
    if (USE_FISHEYE_PROJECTION) {
        const az_rad = (-azimuth_deg * Math.PI) / 180; // 因为是躺在地上看天，所以方位角是从正北逆时针旋转
        const alt_rad = (altitude_deg * Math.PI) / 180;
        // 天顶距（zenith distance）θ = π/2 - altitude
        const theta = Math.PI / 2 - alt_rad; // 弧度
        // 等距鱼眼投影：r ∝ θ，且当地平线（θ = π/2）时 r = R
        // 所以 r = R * (θ / (π/2)) = (2R / π) * θ
        const r = (2 * R / Math.PI) * theta;
        // 投影到平面：X指向东（注意因为是躺在地上看天，所以东是屏幕坐标系的左侧/负半轴），Y指向北
        // azimuth=0°（北）→ (0, r)；azimuth=90°（东）→ (r, 0)
        const X = r * Math.sin(az_rad);
        const Y = -r * Math.cos(az_rad);
        return [X + center_x, Y + center_y];
    }
    // XY投影：笛卡尔坐标系的XY直接垂直投射到地平面上
    else {
        const xyz = horizontal_to_xyz(azimuth_deg, altitude_deg, R);
        if (altitude_deg >= 0) {
            return [xyz[0] + center_x, xyz[1] + center_y]; // 转到canvas的屏幕坐标系
        }
        else {
            return [xyz[0] - center_x, xyz[1] - center_y]; // 地平面以下的，移出canvas显示范围
        }
    }
}


// 屏幕坐标系→地面投影坐标系→反演回地平天球的直角坐标系
function screen_xy_to_xyz(scr_x, scr_y, radius, center_x, center_y) {
    const cx = center_x;
    const cy = center_y;
    const dx = scr_x - cx;
    const dy = scr_y - cy;
    let hor_xyz = [0, 0, 0];
    // 鱼眼投影
    if (USE_FISHEYE_PROJECTION) {
        let r = Math.sqrt(dx*dx + dy*dy) / radius; // 归一化半径
        if (r <= 1) {
            const theta = r * Math.PI / 2; // 天顶角
            const phi = Math.atan2(dx, dy); // 方位角
            hor_xyz = [
                -radius * Math.sin(theta) * Math.sin(phi),
                -radius * Math.sin(theta) * Math.cos(phi),
                radius * Math.cos(theta)
            ];
        }
    }
    // XY投影
    else {
        hor_xyz = [ dx, dy, Math.sqrt(radius*radius - (dx*dx + dy*dy)) ];
    }
    return hor_xyz;
}


function get_luminance(r, g, b) {
    return 0.299 * r + 0.587 * g + 0.114 * b;
}








// 设置像素
function set_pixel(frame_buffer, fb_width, fb_height, x, y, r, g, b) {
    let pixel_index = (y * fb_width + x) * 4;
    frame_buffer[pixel_index    ] = Math.min(255, r);
    frame_buffer[pixel_index + 1] = Math.min(255, g);
    frame_buffer[pixel_index + 2] = Math.min(255, b);
    frame_buffer[pixel_index + 3] = 255;
}

// 叠加像素
function add_pixel(frame_buffer, fb_width, fb_height, x, y, r, g, b) {
    let pixel_index = (y * fb_width + x) * 4;
    frame_buffer[pixel_index    ] = Math.min(255, frame_buffer[pixel_index    ] + r);
    frame_buffer[pixel_index + 1] = Math.min(255, frame_buffer[pixel_index + 1] + g);
    frame_buffer[pixel_index + 2] = Math.min(255, frame_buffer[pixel_index + 2] + b);
    frame_buffer[pixel_index + 3] = 255;
}


function star_burst_filter(frame_buffer, width, height, sun_screen_x, sun_screen_y, sunBrightness) {
    // 亮度阈值
    const threshold = 0.9;

    const cx = sun_screen_x;
    const cy = sun_screen_y;
    const ix = Math.floor(cx), iy = Math.floor(cy);
    if (ix < 0 || ix >= width || iy < 0 || iy >= height) return;

    // 1. 读取原图中该像素的亮度
    const idx = (iy * width + ix) * 4;
    const r = frame_buffer[idx] / 255;
    const g = frame_buffer[idx + 1] / 255;
    const b = frame_buffer[idx + 2] / 255;
    const lum = get_luminance(r, g, b);

    if (lum <= threshold) return; // 不够亮，不绘制星芒

    // 2. 计算星芒颜色和强度
    const factor = Math.min(1, (lum - threshold) * 5);
    const sr = r * factor * 255;
    const sg = g * factor * 255;
    const sb = b * factor * 255;

    // 3. 绘制星芒（沿4个方向双向延伸）
    const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
    const blurLength = 50;
    const decay = 0.94;

    for (const [dx, dy] of directions) {
        const len = Math.hypot(dx, dy);
        const ndx = dx / len, ndy = dy / len;

        for (let d = 1; d <= blurLength; d++) {
            const alpha = Math.pow(decay, d);
            if (alpha < 0.01) break;

            // 正向
            let px = Math.floor(cx + ndx * d);
            let py = Math.floor(cy + ndy * d);
            if (px >= 0 && px < width && py >= 0 && py < height) {
                const i = (py * width + px) * 4;
                frame_buffer[i]     = Math.min(255, frame_buffer[i]     + sr * alpha);
                frame_buffer[i + 1] = Math.min(255, frame_buffer[i + 1] + sg * alpha);
                frame_buffer[i + 2] = Math.min(255, frame_buffer[i + 2] + sb * alpha);
            }

            // 反向
            px = Math.floor(cx - ndx * d);
            py = Math.floor(cy - ndy * d);
            if (px >= 0 && px < width && py >= 0 && py < height) {
                const i = (py * width + px) * 4;
                frame_buffer[i]     = Math.min(255, frame_buffer[i]     + sr * alpha);
                frame_buffer[i + 1] = Math.min(255, frame_buffer[i + 1] + sg * alpha);
                frame_buffer[i + 2] = Math.min(255, frame_buffer[i + 2] + sb * alpha);
            }
        }
    }
}

function draw_rectangle(frame_buffer, fb_width, fb_height, x0, y0, width, height, red, green, blue, mode) {
    for (let y = y0; y < Math.min(fb_height, y0 + height); y++) {
        for (let x = x0; x < Math.min(fb_width, x0 + width); x++) {
            if (mode === 3) {
                add_pixel(frame_buffer, fb_width, fb_height, x, y, red, green, blue);
            }
            else {
                set_pixel(frame_buffer, fb_width, fb_height, x, y, red, green, blue);
            }
        }
    }
}


function draw_line(frame_buffer, fb_width, fb_height, x1, y1, x2, y2, line_width, r, g, b) {
    if (line_width <= 0) return;

    // 确保颜色在 [0, 255] 范围内
    const cr = Math.max(0, Math.min(255, Math.round(r)));
    const cg = Math.max(0, Math.min(255, Math.round(g)));
    const cb = Math.max(0, Math.min(255, Math.round(b)));

    const dx = x2 - x1;
    const dy = y2 - y1;
    const len_sq = dx * dx + dy * dy;

    if (len_sq === 0) {
        // 退化为点：绘制圆形
        const radius = line_width / 2;
        const r_sq = radius * radius;
        const xMin = Math.max(0, Math.floor(x1 - radius));
        const xMax = Math.min(fb_width - 1, Math.ceil(x1 + radius));
        const yMin = Math.max(0, Math.floor(y1 - radius));
        const yMax = Math.min(fb_height - 1, Math.ceil(y1 + radius));

        for (let y = yMin; y <= yMax; y++) {
            for (let x = xMin; x <= xMax; x++) {
                const dist_sq = (x - x1) * (x - x1) + (y - y1) * (y - y1);
                if (dist_sq <= r_sq) {
                    const idx = (y * fb_width + x) * 4;
                    frame_buffer[idx]     = Math.min(255, frame_buffer[idx]     + cr);
                    frame_buffer[idx + 1] = Math.min(255, frame_buffer[idx + 1] + cg);
                    frame_buffer[idx + 2] = Math.min(255, frame_buffer[idx + 2] + cb);
                    frame_buffer[idx + 3] = 255;
                }
            }
        }
        return;
    }

    const len = Math.sqrt(len_sq);
    const inv_len = 1 / len;
    const nx = -dy * inv_len; // 法向量（垂直于线段）
    const ny = dx * inv_len;

    const half_w = line_width / 2;

    // 包围盒（含线宽）
    const xMin = Math.max(0, Math.floor(Math.min(x1, x2) - half_w));
    const xMax = Math.min(fb_width - 1, Math.ceil(Math.max(x1, x2) + half_w));
    const yMin = Math.max(0, Math.floor(Math.min(y1, y2) - half_w));
    const yMax = Math.min(fb_height - 1, Math.ceil(Math.max(y1, y2) + half_w));

    for (let y = yMin; y <= yMax; y++) {
        for (let x = xMin; x <= xMax; x++) {
            // 计算点 (x, y) 到线段的有符号距离
            const px = x - x1;
            const py = y - y1;

            // 投影长度（参数 t）
            const t = (px * dx + py * dy) / len_sq;
            let closest_x, closest_y;

            if (t < 0) {
                closest_x = x1;
                closest_y = y1;
            } else if (t > 1) {
                closest_x = x2;
                closest_y = y2;
            } else {
                closest_x = x1 + t * dx;
                closest_y = y1 + t * dy;
            }

            const dist = Math.sqrt((x - closest_x) * (x - closest_x) + (y - closest_y) * (y - closest_y));

            if (dist > half_w) continue;

            // 抗锯齿：边缘平滑过渡（可选，此处使用简单线性）
            let alpha = 1.0;
            const edge_fade = 1.0; // 像素，可调
            if (dist > half_w - edge_fade) {
                alpha = (half_w - dist) / edge_fade;
                alpha = Math.max(0, Math.min(1, alpha));
            }

            const idx = (y * fb_width + x) * 4;
            const add_r = cr * alpha;
            const add_g = cg * alpha;
            const add_b = cb * alpha;

            frame_buffer[idx]     = Math.min(255, frame_buffer[idx]     + add_r);
            frame_buffer[idx + 1] = Math.min(255, frame_buffer[idx + 1] + add_g);
            frame_buffer[idx + 2] = Math.min(255, frame_buffer[idx + 2] + add_b);
            frame_buffer[idx + 3] = 255;
        }
    }
}


function draw_circle_outline(frame_buffer, fb_width, fb_height, center_x, center_y, radius, line_weight, red, green, blue, alpha) {
    if (radius <= 0 || line_weight <= 0) return;

    const r = Math.max(0, Math.min(255, Math.round(red)));
    const g = Math.max(0, Math.min(255, Math.round(green)));
    const b = Math.max(0, Math.min(255, Math.round(blue)));
    const a = Math.max(0, Math.min(255, Math.round(alpha)));

    // 计算内外半径（考虑线宽居中）
    const halfWeight = line_weight / 2;
    const outerR = radius + halfWeight;
    const innerR = Math.max(0, radius - halfWeight);

    const outerRSq = outerR * outerR;
    const innerRSq = innerR * innerR;

    // 包围盒（含线宽）
    const xMin = Math.max(0, Math.floor(center_x - outerR));
    const xMax = Math.min(fb_width - 1, Math.ceil(center_x + outerR));
    const yMin = Math.max(0, Math.floor(center_y - outerR));
    const yMax = Math.min(fb_height - 1, Math.ceil(center_y + outerR));

    for (let y = yMin; y <= yMax; y++) {
        for (let x = xMin; x <= xMax; x++) {
            const dx = x - center_x;
            const dy = y - center_y;
            const distSq = dx * dx + dy * dy;

            // 判断是否在环形区域内（包含外边界，排除内边界）
            if (distSq < outerRSq && distSq >= innerRSq) {
                const idx = (y * fb_width + x) * 4;
                frame_buffer[idx]     = Math.min(255, frame_buffer[idx]     + r);
                frame_buffer[idx + 1] = Math.min(255, frame_buffer[idx + 1] + g);
                frame_buffer[idx + 2] = Math.min(255, frame_buffer[idx + 2] + b);
                frame_buffer[idx + 3] = Math.min(255, frame_buffer[idx + 2] + a);
            }
        }
    }
}










/**
 * 自然地形生成器
 * @param {ArrayBuffer} frame_buffer - 目标显存/缓冲区 (通常为 ImageData.data)
 * @param {number} fb_width - 缓冲区宽度
 * @param {number} fb_height - 缓冲区高度
 * @param {number} seed - 随机种子
 * @param {number} scale - 地形缩放比例
 * @param {number} octaves - 噪声层数
 */
function generate_landscape(frame_buffer, fb_width, fb_height, seed = 123, scale = 0.005, octaves = 4) {

    // --- 1. 改进的哈希函数 (整数哈希，避免浮点精度问题) ---
    const hash = (ix, iy) => {
        let h = (ix * 374761393 + iy * 668265263 + seed * 123456789) | 0;
        h = (h ^ (h >> 13)) * 1274126177;
        h = h ^ (h >> 16);
        return (h >>> 0) / 4294967296; // 返回 0~1 之间的值
    };

    // --- 2. 修复的噪声函数 (正确的双线性插值) ---
    const noise = (x, y) => {
        const X = Math.floor(x);
        const Y = Math.floor(y);
        const xFrac = x - X;
        const yFrac = y - Y;
        
        // Quintic 平滑曲线 (比 smoothstep 更平滑)
        const u = xFrac * xFrac * xFrac * (xFrac * (xFrac * 6 - 15) + 10);
        const v = yFrac * yFrac * yFrac * (yFrac * (yFrac * 6 - 15) + 10);

        // 四个角落的哈希值
        const tl = hash(X, Y);
        const tr = hash(X + 1, Y);
        const bl = hash(X, Y + 1);
        const br = hash(X + 1, Y + 1);

        // 正确的双线性插值
        const xInterpTop = tl * (1 - u) + tr * u;      // 上边插值
        const xInterpBottom = bl * (1 - u) + br * u;   // 下边插值
        return xInterpTop * (1 - v) + xInterpBottom * v; // 垂直插值
    };

    // --- 3. 分形布朗运动 (FBM) ---
    const getHeight = (x, y) => {
        let value = 0;
        let amplitude = 0.5;
        let frequency = 1;
        let maxValue = 0;

        for (let i = 0; i < octaves; i++) {
            value += amplitude * noise(x * frequency * scale, y * frequency * scale);
            maxValue += amplitude;
            amplitude *= 0.5;
            frequency *= 2;
        }
        
        // 归一化到 0~1，并稍微压缩范围避免极端值
        const normalized = value / maxValue;
        return Math.max(0, Math.min(1, normalized));
    };

    // --- 4. 色彩映射配置 (更细致的过渡) ---
    const palette = [
        { h: 0.00, c: [10, 10, 80] },      // 深海
        { h: 0.25, c: [30, 100, 180] },    // 浅海
        { h: 0.35, c: [100, 150, 200] },   // 近岸浅水
        { h: 0.40, c: [210, 200, 140] },   // 沙滩
        { h: 0.45, c: [180, 200, 100] },   // 沙地过渡
        { h: 0.55, c: [80, 180, 80] },     // 草地
        { h: 0.65, c: [40, 140, 40] },     // 森林
        { h: 0.75, c: [30, 100, 30] },     // 密林
        { h: 0.82, c: [120, 110, 100] },   // 岩石
        { h: 0.90, c: [180, 170, 160] },   // 高山岩石
        { h: 0.95, c: [220, 220, 230] },   // 积雪开始
        { h: 1.00, c: [255, 255, 255] }    // 雪顶
    ];

    const getColor = (height) => {
        if (height <= palette[0].h) return palette[0].c;
        if (height >= palette[palette.length - 1].h) return palette[palette.length - 1].c;

        for (let i = 0; i < palette.length - 1; i++) {
            const p1 = palette[i];
            const p2 = palette[i + 1];
            if (height >= p1.h && height < p2.h) {
                const t = (height - p1.h) / (p2.h - p1.h);
                // 使用缓动函数让颜色过渡更自然
                const tSmooth = t * t * (3 - 2 * t);
                const r = Math.round(p1.c[0] + (p2.c[0] - p1.c[0]) * tSmooth);
                const g = Math.round(p1.c[1] + (p2.c[1] - p1.c[1]) * tSmooth);
                const b = Math.round(p1.c[2] + (p2.c[2] - p1.c[2]) * tSmooth);
                return [r, g, b];
            }
        }
        return [255, 0, 255];
    };

    // --- 5. 主循环：填充像素 ---
    for (let y = 0; y < fb_height; y++) {
        for (let x = 0; x < fb_width; x++) {
            const h = getHeight(x, y) * 2 - 0.1;
            const [r, g, b] = getColor(h);
            
            const index = (y * fb_width + x) * 4;
            frame_buffer[index] = r;
            frame_buffer[index + 1] = g;
            frame_buffer[index + 2] = b;
            frame_buffer[index + 3] = 255;
        }
    }
}




// ============================================
// 体积云渲染相关函数
// ============================================

// 体积云渲染参数
const cloudParams = {
    densityScale: 0.6,    // 云密度缩放
    extinction: 0.36,      // 消光系数
    scattering: 0.72,      // 散射系数
    steps: 16,            // 光线步进步数
    windSpeed: 0.008,     // 风速（云团移动速度）
    ambientLight: 0.3    // 环境光强度（天光照明阴影侧）
};

// 体积云时间偏移（用于动画）
let cloudTimeOffset = 0;

// 定义离散的云团（2-3朵）
// 每个云团有中心位置、半径和形状参数
const cloudClusters = [
    {
        center: { x: 20, y: 20, z: 10 },  // 云团中心位置（地平坐标系）
        radius: 10.0,                       // 水平半径（增大以容纳更多细节）
        height: 4.0,                       // 垂直厚度
        seed: 1234                         // 随机种子
    },
    {
        center: { x: 20, y: -20, z: 10 },
        radius: 16.0,
        height: 5.0,
        seed: 5678
    },
    {
        center: { x: -20, y: -20, z: 10 },
        radius: 16.0,
        height: 6.0,
        seed: 9012
    }
];

// 简单的哈希函数用于生成云团内部细节
const hash31 = (p, seed) => {
    let x = p.x * 0.32 + seed;
    let y = p.y * 0.43 + seed;
    let z = p.z * 0.27 + seed;
    let h = Math.sin(x * 12.9898 + y * 78.233 + z * 45.164) * 43758.5453;
    return h - Math.floor(h);
};

// 三维噪声函数（简化版）
const simpleNoise3D = (x, y, z, seed) => {
    const X = Math.floor(x);
    const Y = Math.floor(y);
    const Z = Math.floor(z);
    const fx = x - X;
    const fy = y - Y;
    const fz = z - Z;
    
    // 双线性插值
    const h000 = hash31({x: X, y: Y, z: Z}, seed);
    const h100 = hash31({x: X+1, y: Y, z: Z}, seed);
    const h010 = hash31({x: X, y: Y+1, z: Z}, seed);
    const h110 = hash31({x: X+1, y: Y+1, z: Z}, seed);
    const h001 = hash31({x: X, y: Y, z: Z+1}, seed);
    const h101 = hash31({x: X+1, y: Y, z: Z+1}, seed);
    const h011 = hash31({x: X, y: Y+1, z: Z+1}, seed);
    const h111 = hash31({x: X+1, y: Y+1, z: Z+1}, seed);
    
    const h00 = h000 * (1-fx) + h100 * fx;
    const h01 = h010 * (1-fx) + h110 * fx;
    const h10 = h001 * (1-fx) + h101 * fx;
    const h11 = h011 * (1-fx) + h111 * fx;
    
    const h0 = h00 * (1-fy) + h01 * fy;
    const h1 = h10 * (1-fy) + h11 * fy;
    
    return h0 * (1-fz) + h1 * fz;
};

// 云密度函数 - 生成离散的云团
const getCloudDensity = (pos, time) => {
    let totalDensity = 0;
    
    // 风向偏移（云团随风移动）
    const windOffsetX = time * cloudParams.windSpeed * 0.5;
    const windOffsetY = time * cloudParams.windSpeed * 0.3;
    
    for (const cloud of cloudClusters) {
        // 计算云团随风移动后的中心
        const cx = cloud.center.x + windOffsetX;
        const cy = cloud.center.y + windOffsetY;
        const cz = cloud.center.z;
        
        // 计算到云团中心的距离
        const dx = pos[0] - cx;
        const dy = pos[1] - cy;
        const dz = pos[2] - cz;
        
        // 水平距离和垂直距离
        const distHorizontal = Math.sqrt(dx*dx + dy*dy);
        const distVertical = Math.abs(dz);
        
        // 如果在云团范围外，跳过
        if (distHorizontal > cloud.radius || distVertical > cloud.height) continue;
        
        // 计算距离因子（从中心到边界逐渐衰减）
        const hFactor = 1 - distHorizontal / cloud.radius;
        const vFactor = 1 - distVertical / cloud.height;
        
        // 使用平滑曲线让云团边缘更自然
        const smoothH = hFactor * hFactor * (3 - 2 * hFactor);
        const smoothV = vFactor * vFactor * (3 - 2 * vFactor);
        
        // 基础形状密度（减少平滑度，保留更多粗糙边缘）
        let baseDensity = hFactor * vFactor;
        
        // 添加内部细节噪声（增加频率和振幅变化以产生破碎效果）
        const noiseScale = 0.05;  // 增加噪声频率（从0.05提高到0.25）
        const nx = pos[0] * noiseScale;
        const ny = pos[1] * noiseScale;
        const nz = pos[2] * noiseScale;
        
        // 增加更多噪声层，高频噪声权重更大以产生破碎细节
        const noise1 = simpleNoise3D(nx, ny, nz, cloud.seed);
        const noise2 = simpleNoise3D(nx * 2.3, ny * 2.3, nz * 2.3, cloud.seed + 1);
        const noise3 = simpleNoise3D(nx * 5.1, ny * 5.1, nz * 5.1, cloud.seed + 2);
        const noise4 = simpleNoise3D(nx * 10.7, ny * 10.7, nz * 10.7, cloud.seed + 3);
        
        // 分形噪声：高频成分权重更高以产生破碎、粗糙的边缘
        const detailNoise = noise1 * 0.20 + noise2 * 0.25 + noise3 * 0.30 + noise4 * 0.25;
        
        // 组合基础形状和细节：噪声对最终密度的影响更大
        // 使用乘法混合让厚薄更不均匀
        let density = baseDensity * detailNoise * 1.5;
        
        // 应用密度阈值，让云团内部更有层次
        density = Math.max(0, density - 0.15) / 0.85;
        
        // 累加密度（云团可能重叠）
        totalDensity = Math.max(totalDensity, density * cloudParams.densityScale);
    }
    
    return Math.min(totalDensity, 1.0);
};

// 计算云的光照（返回直射光透射率，用于阴影计算）
const computeCloudShadow = (pos, sunDir, time) => {
    const shadowSteps = 8;
    const shadowStepSize = 0.8;
    let shadowTransmittance = 1.0;
    
    let shadowPos = [pos[0], pos[1], pos[2]];
    
    for (let i = 0; i < shadowSteps; i++) {
        shadowPos[0] += sunDir[0] * shadowStepSize;
        shadowPos[1] += sunDir[1] * shadowStepSize;
        shadowPos[2] += sunDir[2] * shadowStepSize;
        
        const density = getCloudDensity(shadowPos, time);
        if (density > 0.01) {
            const shadowExtinction = cloudParams.extinction * 2.0;
            shadowTransmittance *= Math.exp(-density * shadowExtinction * shadowStepSize);
            if (shadowTransmittance < 0.01) {
                shadowTransmittance = 0;
                break;
            }
        }
    }
    
    return shadowTransmittance;
};

// 计算向上方向的Ambient Trace（增加背光部细节）
// 从位置向上步进，计算天空透射率，这样背光面不会一片黑色
const computeAmbientTrace = (pos, time) => {
    const ambientSteps = 6;
    const ambientStepSize = 1.0;
    let ambientTransmittance = 1.0;
    
    let tracePos = [pos[0], pos[1], pos[2]];
    const upDir = [0, 0, 1]; // 向上方向（地平坐标系的天顶方向）
    
    for (let i = 0; i < ambientSteps; i++) {
        tracePos[0] += upDir[0] * ambientStepSize;
        tracePos[1] += upDir[1] * ambientStepSize;
        tracePos[2] += upDir[2] * ambientStepSize;
        
        const density = getCloudDensity(tracePos, time);
        if (density > 0.01) {
            const extinction = cloudParams.extinction * 1.5;
            ambientTransmittance *= Math.exp(-density * extinction * ambientStepSize);
            if (ambientTransmittance < 0.05) {
                ambientTransmittance = 0;
                break;
            }
        }
    }
    
    // 返回天空可见度（越接近天空，值越高）
    return ambientTransmittance;
};


// 计算天光颜色（环境光）
const getNormalizedColor = (sky_r, sky_g, sky_b) => {
    // 将天光归一化
    const maxVal = Math.max(sky_r, sky_g, sky_b, 1);
    // 天光通常是蓝色调，用于照明云的阴影侧
    return [sky_r / maxVal, sky_g / maxVal, sky_b / maxVal];
};

// 计算所有云团的整体包围盒
function getCloudBoundingBox(time) {
    const windOffsetX = time * cloudParams.windSpeed * 0.5;
    const windOffsetY = time * cloudParams.windSpeed * 0.3;
    
    let minZ = Infinity, maxZ = -Infinity;
    
    for (const cloud of cloudClusters) {
        const cz = cloud.center.z;
        minZ = Math.min(minZ, cz - cloud.height);
        maxZ = Math.max(maxZ, cz + cloud.height);
    }
    
    return { minZ: Math.max(5, minZ), maxZ }; // 最低不低于5
}

// 体积云渲染函数
function render_volumetric_clouds(
    frame_buffer, fb_width, fb_height,
    sky_radius, center_x, center_y,
    view_alt, view_azi, view_roll, f,
    sun_alt, sun_azi, time,
    sky_r, sky_g, sky_b,
    sunlight_r, sunlight_g, sunlight_b
) {
    if (!enable_volumetric_cloud) return;
    
    // 计算太阳方向向量（在地平坐标系中）
    const sun_alt_rad = to_rad(sun_alt);
    const sun_azi_rad = to_rad(sun_azi);
    const sunDir = [
        Math.cos(sun_alt_rad) * Math.sin(sun_azi_rad),
        Math.cos(sun_alt_rad) * Math.cos(sun_azi_rad),
        Math.sin(sun_alt_rad)
    ];
    
    // 如果太阳在地平线以下，减弱云的亮度
    const sunElevationFactor = Math.max(0, Math.min(1, (sun_alt + 6) / 12));
    // if (sunElevationFactor < 0.05) return; // 夜间不显示云
    
    // 获取太阳光颜色（直射光）- 随太阳高度变化
    const sunColor = getNormalizedColor(sunlight_r, sunlight_g, sunlight_b);
    // 获取天光颜色（环境光）- 照明阴影侧
    const skyColor = getNormalizedColor(sky_r, sky_g, sky_b);
    
    // 获取云团整体包围盒
    const bbox = getCloudBoundingBox(cloudTimeOffset);
    
    // 遍历所有像素（不做圆形边界假设，适应任意视角）
    for (let y = 0; y < fb_height; y++) {
        for (let x = 0; x < fb_width; x++) {
            // 使用fisheye_unproject获取视线方向（已经在地平坐标系中）
            let ray_vec = fisheye_unproject(x, y, sky_radius, center_x, center_y, view_alt, view_azi, view_roll, f);
            
            // 检查是否反解成功（如果失败会返回零向量或极小值）
            const ray_len = Math.sqrt(ray_vec[0] * ray_vec[0] + ray_vec[1] * ray_vec[1] + ray_vec[2] * ray_vec[2]);
            if (ray_len < 1e-10) continue;
            
            // 归一化视线方向
            const rayDir = [ray_vec[0] / ray_len, ray_vec[1] / ray_len, ray_vec[2] / ray_len];
            
            // 只处理朝上的视线（z > 0表示在地平线以上）
            if (rayDir[2] <= 0.01) continue;
            
            // 计算视线与云团整体包围盒的交点
            const tEnter = bbox.minZ / rayDir[2];
            const tExit = bbox.maxZ / rayDir[2];
            
            // 确保交点在视线正方向上
            if (tEnter < 0 || tExit < 0 || tExit <= tEnter) continue;
            
            // 光线步进参数
            let transmittance = 1.0;
            let accumR = 0, accumG = 0, accumB = 0;
            const stepSize = (tExit - tEnter) / cloudParams.steps;
            
            // 随机偏移避免条纹效应
            const offset = Math.random() * stepSize;
            let t = tEnter + offset;
            
            for (let step = 0; step < cloudParams.steps; step++) {
                const pos = [
                    rayDir[0] * t,
                    rayDir[1] * t,
                    rayDir[2] * t
                ];
                
                const density = getCloudDensity(pos, time);
                
                if (density > 0.01) {
                    // 计算直射光阴影
                    const directLightShadow = computeCloudShadow(pos, sunDir, time);
                    
                    // 直射光照度（太阳光，随太阳高度变色）
                    const directLight = directLightShadow * sunElevationFactor;
                    
                    // 计算向上Ambient Trace（增加背光部细节）
                    // 这样即使云密度高，背光面也不会一片黑色
                    const ambientTrace = computeAmbientTrace(pos, time);
                    // 环境光 = 基础天光 + 向上Trace增强
                    // ambientTrace越高（越接近天空），环境光越强
                    const ambientLight = cloudParams.ambientLight * (0.2 + 0.8 * ambientTrace);
                    
                    // 散射计算
                    const scatter = density * cloudParams.scattering;
                    
                    // 直射光贡献（使用太阳光颜色）
                    const directR = scatter * directLight * sunColor[0];
                    const directG = scatter * directLight * sunColor[1];
                    const directB = scatter * directLight * sunColor[2];
                    
                    // 环境光贡献（使用天光颜色，球谐光照明背光面）
                    const ambientR = scatter * ambientLight * skyColor[0];
                    const ambientG = scatter * ambientLight * skyColor[1];
                    const ambientB = scatter * ambientLight * skyColor[2];
                    
                    // 合并两种光照
                    const cloudR = directR + ambientR;
                    const cloudG = directG + ambientG;
                    const cloudB = directB + ambientB;
                    
                    // 累积颜色
                    accumR += cloudR * transmittance;
                    accumG += cloudG * transmittance;
                    accumB += cloudB * transmittance;
                    
                    // 更新透射率
                    const attenuation = Math.exp(-cloudParams.extinction * density * stepSize);
                    transmittance *= attenuation;
                    
                    // 提早终止
                    if (transmittance < 0.01) break;
                }
                
                t += stepSize;
            }
            
            // 如果有云贡献，混合到帧缓冲区
            if (accumR > 0 || accumG > 0 || accumB > 0) {
                const idx = (y * fb_width + x) * 4;
                
                // 读取背景颜色
                const bgR = frame_buffer[idx] / 255;
                const bgG = frame_buffer[idx + 1] / 255;
                const bgB = frame_buffer[idx + 2] / 255;
                
                // 混合：云颜色 + 背景色 * 透射率
                const finalR = Math.min(1, accumR + bgR * transmittance);
                const finalG = Math.min(1, accumG + bgG * transmittance);
                const finalB = Math.min(1, accumB + bgB * transmittance);
                
                frame_buffer[idx] = Math.round(finalR * 255);
                frame_buffer[idx + 1] = Math.round(finalG * 255);
                frame_buffer[idx + 2] = Math.round(finalB * 255);
            }
        }
    }
}

/**
 * 将正方形平面图像映射为圆形鱼眼图像
 * @param {Uint8ClampedArray} inputBuffer - 输入图像数据 (RGBA)
 * @param {Uint8ClampedArray} outputBuffer - 输出图像数据 (RGBA)
 * @param {number} width - 图像宽度 (假设宽高相等)
 * @param {number} height - 图像高度 (假设宽高相等)
 * @param {number} fovFactor - 鱼眼视场角因子 (0.5 ~ 1.55), 越大畸变越强
 */
function to_fisheye(inputBuffer, outputBuffer, width, height, fovFactor = 1.3) {
    const centerX = width / 2;
    const centerY = height / 2;
    const maxRadius = width / 2;
    
    // 输入图像的最大半径 (半对角线), 确保正方形角点映射到圆边缘
    const inputMaxRadius = maxRadius; // Math.sqrt(centerX * centerX + centerY * centerY);
    
    // 预计算 tan(fovFactor), 避免循环内重复计算
    const tanFov = Math.tan(fovFactor);
    
    // 遍历输出图像的每一个像素 (逆向映射)
    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const dx = x - centerX;
            const dy = y - centerY;
            const rOut = Math.sqrt(dx * dx + dy * dy);
            
            // 如果在输出圆外，设为透明
            if (rOut > maxRadius) {
                const idx = (y * width + x) * 4;
                outputBuffer[idx] = 0;
                outputBuffer[idx + 1] = 0;
                outputBuffer[idx + 2] = 0;
                outputBuffer[idx + 3] = 0;
                continue;
            }
            
            // 归一化半径 (0 ~ 1)
            const rNorm = rOut / maxRadius;
            
            // 计算角度
            const theta = Math.atan2(dy, dx);
            
            // 鱼眼映射核心公式 (正切投影)
            let rIn;
            if (fovFactor >= Math.PI / 2 - 0.001) {
                // 防止 tan 无穷大，退化处理
                rIn = rNorm * inputMaxRadius;
            } else {
                rIn = inputMaxRadius * Math.tan(rNorm * fovFactor) / tanFov;
            }
            
            // 计算输入图像的坐标
            const srcX = centerX + rIn * Math.cos(theta);
            const srcY = centerY + rIn * Math.sin(theta);
            
            // 双线性插值获取颜色
            const color = bilinearSample(inputBuffer, srcX, srcY, width, height);
            
            // 写入输出像素
            const outIdx = (y * width + x) * 4;
            outputBuffer[outIdx] = color[0];
            outputBuffer[outIdx + 1] = color[1];
            outputBuffer[outIdx + 2] = color[2];
            outputBuffer[outIdx + 3] = color[3];
        }
    }
}

/**
 * 双线性插值采样
 * @param {Uint8ClampedArray} buffer - 图像数据
 * @param {number} x - 采样点 X 坐标 (浮点数)
 * @param {number} y - 采样点 Y 坐标 (浮点数)
 * @param {number} width - 图像宽度
 * @param {number} height - 图像高度
 * @returns {number[]} [R, G, B, A]
 */
function bilinearSample(buffer, x, y, width, height) {
    // 边界检查
    if (x < 0 || x >= width - 1 || y < 0 || y >= height - 1) {
        return [0, 0, 0, 0];
    }
    
    const x0 = Math.floor(x);
    const y0 = Math.floor(y);
    const x1 = x0 + 1;
    const y1 = y0 + 1;
    
    const dx = x - x0;
    const dy = y - y0;
    const dx1 = 1 - dx;
    const dy1 = 1 - dy;
    
    const idx00 = (y0 * width + x0) * 4;
    const idx10 = (y0 * width + x1) * 4;
    const idx01 = (y1 * width + x0) * 4;
    const idx11 = (y1 * width + x1) * 4;
    
    // 对 RGBA 四个通道分别插值
    return [
        buffer[idx00] * dx1 * dy1 + buffer[idx10] * dx * dy1 + 
        buffer[idx01] * dx1 * dy + buffer[idx11] * dx * dy,
        
        buffer[idx00 + 1] * dx1 * dy1 + buffer[idx10 + 1] * dx * dy1 + 
        buffer[idx01 + 1] * dx1 * dy + buffer[idx11 + 1] * dx * dy,
        
        buffer[idx00 + 2] * dx1 * dy1 + buffer[idx10 + 2] * dx * dy1 + 
        buffer[idx01 + 2] * dx1 * dy + buffer[idx11 + 2] * dx * dy,
        
        buffer[idx00 + 3] * dx1 * dy1 + buffer[idx10 + 3] * dx * dy1 + 
        buffer[idx01 + 3] * dx1 * dy + buffer[idx11 + 3] * dx * dy
    ];
}









// 地面填充纯黑色
function draw_horizon(
    frame_buffer, fb_width, fb_height, R, center_x, center_y, view_alt, view_azi, view_roll, f, sun_alt,
    enable_atmosphere_scattering, atmo_r, atmo_g, atmo_b
) {
    function getPixel(tex, x, y, c) {
        return tex[((y * landscape_texture_width + x) * 4) + c];
    }
    const max_scattering_depth = 0.8;
    const margin = 10;
    // const k = Math.max(0.2, Math.sin(to_rad(sun_alt)) * 1.5);
    const k = (1 / Math.PI) * Math.atan((sun_alt - 6) / 6) + 0.5 + 0.2;
    for (let y = 0; y < fb_height; y++) {
        for (let x = 0; x < fb_width; x++) {
            const [hx, hy, hz] = fisheye_unproject(x, y, R, center_x, center_y, view_alt, view_azi, view_roll, f);
            if (hz < 0) {
                if (landscape_texture_rgba === null) {
                    const idx = (y * fb_width + x) * 4;
                    frame_buffer[idx + 0] = 0;     // R
                    frame_buffer[idx + 1] = 0;     // G
                    frame_buffer[idx + 2] = 0;     // B
                    frame_buffer[idx + 3] = 255;   // A
                }
                else {
                    // 反解此处的xyz坐标，转为地平坐标
                    let [alt, azi, rr] = xyz_to_horizontal(-hx, -hy, hz);
                    // 再转为地面贴图上的xy坐标
                    let [tx, ty] = horizontal_to_screen_xy(-azi, -alt, 300, 300, 300); // R略小于地面贴图的半径，注意修改其中的center_x/y

                    let r = getPixel(landscape_texture_rgba, Math.floor(tx), Math.floor(ty), 0);
                    let g = getPixel(landscape_texture_rgba, Math.floor(tx), Math.floor(ty), 1);
                    let b = getPixel(landscape_texture_rgba, Math.floor(tx), Math.floor(ty), 2);

                    // 模拟近地大气散射
                    let scattered_r = 1.0;
                    let scattered_g = 1.0;
                    let scattered_b = 1.0;
                    if (enable_atmosphere_scattering) {
                        let depth = Math.sqrt(hx * hx + hy * hy) / rr;
                        depth = Math.min(1.0, Math.pow(depth, 3.0)) * max_scattering_depth;
                        scattered_r = (1 - depth) * r + atmo_r * depth;
                        scattered_g = (1 - depth) * g + atmo_g * depth;
                        scattered_b = (1 - depth) * b + atmo_b * depth;
                    }
                    else {
                        scattered_r = r;
                        scattered_g = g;
                        scattered_b = b;
                    }

                    r = Math.min(255.0, (scattered_r * k));
                    g = Math.min(255.0, (scattered_g * k));
                    b = Math.min(255.0, (scattered_b * k));

                    const idx = (y * fb_width + x) * 4;
                    frame_buffer[idx + 0] = r; // R
                    frame_buffer[idx + 1] = g; // G
                    frame_buffer[idx + 2] = b; // B
                    frame_buffer[idx + 3] = 255;   // A
                }
            }
            else if (enable_atmosphere_scattering && hz <= margin && hz >= 0) {
                let cr = atmo_r * k;
                let cg = atmo_g * k;
                let cb = atmo_b * k;
                let t = Math.sqrt(hz / margin);
                let idx = (y * fb_width + x) * 4;
                frame_buffer[idx + 0] = Math.min(255.0, ((1.0 - t) * cr + t * frame_buffer[idx + 0]));
                frame_buffer[idx + 1] = Math.min(255.0, ((1.0 - t) * cg + t * frame_buffer[idx + 1]));
                frame_buffer[idx + 2] = Math.min(255.0, ((1.0 - t) * cb + t * frame_buffer[idx + 2]));
                frame_buffer[idx + 3] = 255;   // A
            }
        }
    }
}



function draw_sun(frame_buffer, fb_width, fb_height, sun_x, sun_y, sun_altitude_deg, sun_radius) {
    // 1. 太阳半径（随高度变化）：地平线附近略大
    const baseRadius = (sun_radius < 2) ? 2 : sun_radius; // 像素
    const radius = baseRadius * (1 + 0.20 * Math.max(0, 1 - sun_altitude_deg / 10)); // 地平线+15%

    // 2. 光晕半径（可调）
    const glowRadius = 3; // Math.max(radius, 3); // 可根据需要调整

    // 3. 太阳颜色：随高度从红→黄→白
    let r, g, b;
    if (sun_altitude_deg < 5) {
        // 接近地平线：深红到橙
        const t = Math.min(1, sun_altitude_deg / 5);
        r = 255;
        g = Math.round(160 * t);
        b = Math.round(40 * t);
    } else if (sun_altitude_deg < 15) {
        // 低空：橙黄
        const t = (sun_altitude_deg - 5) / 10;
        r = 255;
        g = Math.round(160 + 95 * t);
        b = Math.round(40 + 60 * t);
    } else {
        // 中天：白色
        r = 255;
        g = 255;
        b = 255;
    }

    // 4. 抗锯齿边缘宽度
    const edgeSmoothWidth = 1;

    // 5. 绘制太阳本体（带软边缘）
    for (let dy = -glowRadius; dy <= glowRadius; dy++) {
        for (let dx = -glowRadius; dx <= glowRadius; dx++) {
            const dist = Math.sqrt(dx * dx + dy * dy);
            const px = Math.floor(sun_x + dx);
            const py = Math.floor(sun_y + dy);
            if (px < 0 || px >= fb_width || py < 0 || py >= fb_height) continue;

            const idx = (py * fb_width + px) * 4;

            // 背景颜色（用于混合）
            const bgR = frame_buffer[idx] / 255;
            const bgG = frame_buffer[idx + 1] / 255;
            const bgB = frame_buffer[idx + 2] / 255;

            // === 太阳光晕（指数衰减）===
            let glow = 0;
            if (dist > radius && dist <= glowRadius) {
                // 光晕强度随距离衰减
                glow = Math.exp(-(dist / glowRadius) * 3);
            }

            // === 太阳本体（带抗锯齿）===
            let diskWeight = 0;
            if (dist <= radius + edgeSmoothWidth) {
                if (dist <= radius - edgeSmoothWidth) {
                    diskWeight = 1.0;
                }
                else if (dist < radius + edgeSmoothWidth) {
                    const t = (radius + edgeSmoothWidth - dist) / (2 * edgeSmoothWidth);
                    diskWeight = Math.max(0, Math.min(1, t * t * (3 - 2 * t))); // smoothstep
                }
            }

            // 合并：中心最亮（diskWeight=1），向外过渡到光晕
            const totalR = diskWeight * r + glow * r;
            const totalG = diskWeight * g + glow * g;
            const totalB = diskWeight * b + glow * b;

            // 混合到背景（直接覆盖或叠加，这里选择叠加以保留星芒基础）
            frame_buffer[idx]     = Math.min(255, bgR * 255 + totalR);
            frame_buffer[idx + 1] = Math.min(255, bgG * 255 + totalG);
            frame_buffer[idx + 2] = Math.min(255, bgB * 255 + totalB);
        }
    }
}



// 基于球面几何 terminator 的月相绘制（带物理合理的软边缘）
function draw_moon(frame_buffer, fb_width, fb_height, center_x, center_y, lum, radius, phase_deg, bright_limb_pos_angle_deg, surface_tilt_deg) {
    const moonX = center_x;
    const moonY = center_y;
    const moonRadius = radius;

    // 相位角（日地距角）
    const cosPhase = Math.cos(to_rad(phase_deg));
    const sinPhase = Math.sin(to_rad(phase_deg));
    const sunDirX = cosPhase * Math.cos(to_rad(bright_limb_pos_angle_deg));
    const sunDirY = cosPhase * Math.sin(to_rad(bright_limb_pos_angle_deg));
    const sunDirZ = sinPhase;

    const sunLen = Math.sqrt(sunDirX * sunDirX + sunDirY * sunDirY + sunDirZ * sunDirZ);
    const sunUnitX = sunLen > 0 ? sunDirX / sunLen : 1;
    const sunUnitY = sunLen > 0 ? sunDirY / sunLen : 0;
    const sunUnitZ = sunLen > 0 ? sunDirZ / sunLen : 0;

    // 颜色与环境光
    const litColor = [220, 220, 200];
    const darkColor = [10, 10, 20];
    const ambient = 0.01;

    // 半影角宽度（弧度）：太阳角半径 ≈ 0.0047 rad，取稍大值保证可见性
    const PENUMBRA_HALF_ANGLE = 0.2; // ≈ 0.5°

    // 抗锯齿过渡带宽度（像素）
    const edgeSmoothWidth = 1.0;

    const r2 = moonRadius * moonRadius;
    for (let dy = -moonRadius; dy <= moonRadius; dy++) {
        for (let dx = -moonRadius; dx <= moonRadius; dx++) {
            const distSq = dx * dx + dy * dy;
            const distance = Math.sqrt(distSq);

            if (distance > moonRadius + edgeSmoothWidth) continue;

            const px = Math.floor(moonX + dx);
            const py = Math.floor(moonY + dy);
            if (px < 0 || px >= fb_width || py < 0 || py >= fb_height) continue;

            const idx = (py * fb_width + px) * 4;

            // === 1. 计算抗锯齿权重（基于圆盘覆盖比例）===
            let moonWeight;
            if (distance <= moonRadius - edgeSmoothWidth) {
                moonWeight = 1.0; // 完全在内部
            }
            else if (distance >= moonRadius + edgeSmoothWidth) {
                moonWeight = 0.0; // 完全在外部（应跳过，但保留以防边界误差）
                continue;
            }
            else {
                // 平滑过渡 [moonRadius - w, moonRadius + w]
                const t = (moonRadius + edgeSmoothWidth - distance) / (2 * edgeSmoothWidth);
                moonWeight = Math.max(0, Math.min(1, t)); // 线性插值，也可用 smoothstep
                // 可选更平滑：moonWeight = t * t * (3 - 2 * t);
            }

            if (moonWeight <= 0) continue;




            // 构造单位球面上的表面点（归一化位置向量 = 法向量）
            const len = Math.sqrt(dx * dx + dy * dy + r2 - dx * dx - dy * dy); // = moonRadius
            // 实际上，(dx, dy, dz) 在半径为 moonRadius 的球面上，所以单位向量为：
            const nx = dx / moonRadius;
            const ny = dy / moonRadius;
            const nz = Math.sqrt(Math.max(0, r2 - dx * dx - dy * dy)) / moonRadius;

            // 关键：计算该点与 terminator 的球面角距离
            // terminator 是太阳方向与月球中心构成的大圆
            // 点积 dot = cos(θ)，其中 θ 是表面点与太阳方向的夹角
            const dot = nx * sunUnitX + ny * sunUnitY + nz * sunUnitZ;

            // θ = acos(dot)，但避免 acos 开销，直接用 dot 表示角度关系
            // terminator 位于 dot = 0（即 θ = 90°）
            // 我们定义 signed_angle_dist ∝ -dot （因为 dot>0 为亮区）
            // 将角距离映射为线性过渡变量（单位：弧度等效）

            // 使用小角度近似：angle ≈ sqrt(1 - dot^2) 不适用；更简单：
            // 直接用 dot 作为“余弦空间”的代理变量，其梯度在 terminator 附近 ≈ 1/rad
            // 因此，我们定义“有效角偏移”为：
            const angleFromTerminator = Math.acos(Math.max(-1, Math.min(1, dot))) - Math.PI / 2; // ∈ [-π/2, π/2]

            // 或者更高效（避免 acos）：利用 sin(θ - π/2) = -cosθ = -dot
            // 在 terminator 附近（θ≈π/2），有 θ - π/2 ≈ -dot （一阶泰勒）
            // 所以可用：approxAngle = -dot （单位为“弧度等效”，需缩放）
            // 但为保精度，这里采用 acos 方法（可选优化见注释）

            // === 软边缘判断 ===
            let intensity;
            if (angleFromTerminator >= PENUMBRA_HALF_ANGLE) {
                intensity = 1.0; // 完全照亮
            } else if (angleFromTerminator <= -PENUMBRA_HALF_ANGLE) {
                intensity = ambient; // 完全背光
            } else {
                // 映射到 [0,1]
                const t = (angleFromTerminator + PENUMBRA_HALF_ANGLE) / (2 * PENUMBRA_HALF_ANGLE);
                const smoothT = t * t * (3 - 2 * t); // smoothstep
                intensity = ambient + (1 - ambient) * smoothT;
            }

            // 调整全局亮度
            intensity *= lum;






            // === 纹理映射：先绕 Z 轴旋转 -alpha，再映射到经纬度 ===
            let u_norm = dx / moonRadius;   // ∈ [-1, 1]
            let v_norm = dy / moonRadius;   // ∈ [-1, 1]

            // 绕原点旋转 -alpha（使贴图随光照方向对齐）
            const cosA = Math.cos(-to_rad(surface_tilt_deg));
            const sinA = Math.sin(-to_rad(surface_tilt_deg));
            const u_rot = u_norm * cosA - v_norm * sinA;
            const v_rot = u_norm * sinA + v_norm * cosA;

            // 映射到 [0,1] 贴图空间
            let u = (u_rot + 1) * 0.5; // [-1,1] → [0,1]
            let v = (v_rot + 1) * 0.5;

            // 可选：限制在 [0,1] 内（避免边缘采样异常）
            if (u < 0 || u > 1 || v < 0 || v > 1) {
                // 可选择 clamp 或 skip；这里 clamp 更安全
                u = Math.max(0, Math.min(1, u));
                v = Math.max(0, Math.min(1, v));
            }

            // 双线性采样
            const tx = u * moon_texture_width - 0.5;
            const ty = v * moon_texture_height - 0.5;

            const x0 = Math.floor(tx);
            const y0 = Math.floor(ty);
            const x1 = (x0 + 1) % moon_texture_width;
            const y1 = Math.min(y0 + 1, moon_texture_height - 1);

            const wx = tx - x0;
            const wy = ty - y0;

            function getPixel(tex, x, y, c) {
                return tex[((y * moon_texture_width + x) * 4) + c];
            }

            const c00_r = getPixel(moon_texture_rgba, x0, y0, 0);
            const c00_g = getPixel(moon_texture_rgba, x0, y0, 1);
            const c00_b = getPixel(moon_texture_rgba, x0, y0, 2);

            const c10_r = getPixel(moon_texture_rgba, x1, y0, 0);
            const c10_g = getPixel(moon_texture_rgba, x1, y0, 1);
            const c10_b = getPixel(moon_texture_rgba, x1, y0, 2);

            const c01_r = getPixel(moon_texture_rgba, x0, y1, 0);
            const c01_g = getPixel(moon_texture_rgba, x0, y1, 1);
            const c01_b = getPixel(moon_texture_rgba, x0, y1, 2);

            const c11_r = getPixel(moon_texture_rgba, x1, y1, 0);
            const c11_g = getPixel(moon_texture_rgba, x1, y1, 1);
            const c11_b = getPixel(moon_texture_rgba, x1, y1, 2);

            // bilinear interpolation
            const r0 = c00_r + wx * (c10_r - c00_r);
            const g0 = c00_g + wx * (c10_g - c00_g);
            const b0 = c00_b + wx * (c10_b - c00_b);

            const r1 = c01_r + wx * (c11_r - c01_r);
            const g1 = c01_g + wx * (c11_g - c01_g);
            const b1 = c01_b + wx * (c11_b - c01_b);

            let texR = r0 + wy * (r1 - r0);
            let texG = g0 + wy * (g1 - g0);
            let texB = b0 + wy * (b1 - b0);

            // 应用光照强度
            let r = Math.round(texR * intensity);
            let g = Math.round(texG * intensity);
            let b = Math.round(texB * intensity);

            r = isNaN(r) ? 0 : r;
            g = isNaN(g) ? 0 : g;
            b = isNaN(b) ? 0 : b;

            frame_buffer[idx + 0] = Math.min(255, frame_buffer[idx + 0] + moonWeight * r);
            frame_buffer[idx + 1] = Math.min(255, frame_buffer[idx + 1] + moonWeight * g);
            frame_buffer[idx + 2] = Math.min(255, frame_buffer[idx + 2] + moonWeight * b);
        }
    }
}



function draw_star(frame_buffer, fb_width, fb_height, sx, sy, magnitude, radius, red, green, blue) {

    const maxGlowRadius = 2; // 光晕最大半径（像素）

    const starLumBase = magnitude_to_relative_luminance(magnitude);

    // 获取背景亮度用于对比度抑制
    const bgIdx = Math.round(sy * fb_width + sx) * 4;
    const bgR = frame_buffer[bgIdx] / 255;
    const bgG = frame_buffer[bgIdx + 1] / 255;
    const bgB = frame_buffer[bgIdx + 2] / 255;
    const bgLum = 0.299 * bgR + 0.587 * bgG + 0.114 * bgB;

    // 遍历光晕区域（正方形包围圆）
    const R = 0; // radius + maxGlowRadius;
    for (let dy = -R; dy <= R; dy++) {
        for (let dx = -R; dx <= R; dx++) {
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > R) continue;

            const px = Math.round(sx + dx);
            const py = Math.round(sy + dy);
            if (px < 0 || px >= fb_width || py < 0 || py >= fb_height) continue;

            const idx = (py * fb_width + px) * 4;

            let starLum = 0;
            if (dist <= radius) {
                starLum = starLumBase;
            }
            // 光晕衰减
            else if (dist > radius) {
                starLum = starLumBase * Math.exp(-dist * 1);
            }

            // 对比度抑制：白天背景亮时，星星和光晕都应被压制
            const contrast = starLum / (bgLum + 0.001);
            let visibility = 1.0;
            if (contrast < 1.0) {
                // visibility = Math.pow(contrast, 3);
                visibility = contrast * contrast * contrast;
            }
            starLum *= visibility;

            // 转为 0–255 范围
            const r = Math.min(255, starLum * red);
            const g = Math.min(255, starLum * green);
            const b = Math.min(255, starLum * blue);

            // 叠加到 RGB（保持白色光晕，可改为彩色）
            frame_buffer[idx + 0] = Math.min(255, frame_buffer[idx + 0] + r);
            frame_buffer[idx + 1] = Math.min(255, frame_buffer[idx + 1] + g);
            frame_buffer[idx + 2] = Math.min(255, frame_buffer[idx + 2] + b);
        }
    }
}


/**
 * 绘制赤道坐标系下的子午圈或纬度圈（投影到地平屏幕）
 * @param {Uint8ClampedArray} frame_buffer - 帧缓冲区
 * @param {number} fb_width - 缓冲区宽度
 * @param {number} fb_height - 缓冲区高度
 * @param {boolean} isMeridian - true: 子午圈（固定RA）；false: 纬度圈（固定Dec）
 * @param {number|null} ra_hours - 子午圈的赤经（小时），仅当 isMeridian=true 时有效
 * @param {number|null} dec_deg - 纬度圈的赤纬（度），仅当 isMeridian=false 时有效
 * @param {number} line_weight - 线宽（像素），建议 ≥1
 * @param {number} colorR, colorG, colorB - RGB 颜色分量 [0-255]
 * @param {number} year, month, day, hour, minute, second, timezone, longitude, latitude - 观测参数
 */
function draw_celestial_circle(
    frame_buffer, fb_width, fb_height,
    sky_radius, center_x, center_y,
    view_alt, view_azi, view_roll, f,
    isMeridian, ra_hours, dec_deg,
    line_weight, colorR, colorG, colorB,
    year, month, day, hour, minute, second, timezone, longitude, latitude
) {
    const POINTS = 360; // 提高采样密度以获得更平滑曲线
    const R = sky_radius;

    let points = [];

    if (isMeridian) {
        // 子午圈：固定 RA，遍历 Dec ∈ [-90°, +90°]
        if (ra_hours === null || ra_hours < 0 || ra_hours > 24) return;
        const ra_deg = (ra_hours % 24) * 15;
        for (let i = 0; i <= POINTS; i++) {
            const dec = -90 + (180 * i / POINTS);
            const [alt, az] = equatorial_to_horizontal(
                ra_deg, dec, year, month, day, hour, minute, second, timezone, longitude, latitude
            );
            if (alt >= 0) {
                const [x, y] = fisheye_project(az, alt, R, center_x, center_y, view_alt, view_azi, view_roll, f);
                points.push([x, y]);
            } else {
                points.push(null);
            }
        }
    } else {
        // 纬度圈：固定 Dec，遍历 RA ∈ [0h, 24h)
        if (dec_deg === null || dec_deg < -90 || dec_deg > 90) return;
        for (let i = 0; i <= POINTS; i++) {
            const ra_h = 24 * i / POINTS;
            const ra_deg = (ra_h % 24) * 15;
            const [alt, az] = equatorial_to_horizontal(
                ra_deg, dec_deg, year, month, day, hour, minute, second, timezone, longitude, latitude
            );
            if (alt >= 0) {
                const [x, y] = fisheye_project(az, alt, R, center_x, center_y, view_alt, view_azi, view_roll, f);
                points.push([x, y]);
            } else {
                points.push(null);
            }
        }
    }

    // 使用抗锯齿 draw_line 连接可见段
    for (let i = 0; i < points.length - 1; i++) {
        const p1 = points[i];
        const p2 = points[i + 1];
        if (p1 && p2) {
            draw_line(frame_buffer, fb_width, fb_height, p1[0], p1[1], p2[0], p2[1], line_weight, colorR, colorG, colorB);
        }
    }
}
